<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FFGarouX.lvl</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body { background: #0a0a0a; color: #ddd; font-family: system-ui, sans-serif; }
    .card { background: #111111; border-radius: 16px; }
    .progress-container { background: #1f1f1f; height: 8px; border-radius: 9999px; overflow: hidden; }
    .progress-bar { height: 100%; background: linear-gradient(90deg, #22c55e, #4ade80); transition: width 0.6s ease; }
    .live-dot { animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
  </style>
</head>
<body class="min-h-screen pb-12">

<div class="max-w-xl mx-auto pt-8 px-4">

  <div class="flex items-center justify-between mb-6">
    <div class="flex items-center gap-3">
      <img src="GAROUXa.jpg" alt="GarouX" class="w-10 h-10 rounded-xl object-cover border-2 border-red-500 shadow-lg">
      <div>
        <h1 class="text-3xl font-bold tracking-tighter">FFGarouX.lvl</h1>
        <p class="text-xs text-zinc-500 -mt-1">garoux.site</p>
      </div>
    </div>
    <button onclick="refreshAll()" class="flex items-center gap-2 bg-zinc-800 hover:bg-zinc-700 px-6 py-2.5 rounded-2xl text-sm">
      <i class="fa-solid fa-rotate"></i> Refresh All
    </button>
  </div>

  <div id="mainAccounts" class="space-y-8"></div>

  <div class="my-10">
    <div class="flex gap-3">
      <input id="uidInput" type="text" placeholder="Добавить новый UID" 
             class="flex-1 bg-zinc-900 border border-zinc-700 focus:border-green-500 rounded-3xl px-6 py-4 text-lg outline-none">
      <button onclick="addNewAccount()" class="bg-green-500 hover:bg-green-600 px-10 py-4 rounded-3xl font-semibold text-black">
        Добавить
      </button>
    </div>
  </div>
</div>

<script>
// ==================== EXP TABLE ====================
const EXP_TABLE = { 
  1: [0,48],2:[48,154],3:[202,342],4:[544,468],5:[1012,832],
  6:[1844,948],7:[2792,1008],8:[3800,1070],9:[4870,1134],10:[6004,1188],
  11:[7192,1256],12:[8448,1328],13:[9776,1364],14:[11140,1426],15:[12566,1494],
  16:[14060,1550],17:[15610,1614],18:[17224,1678],19:[18902,1730],20:[20632,1792],
  21:[22424,2304],22:[24728,1464],23:[26192,1974],24:[28166,2034],25:[30200,2094],
  26:[32294,2154],27:[34448,3356],28:[37804,3370],29:[41174,3696],30:[44870,3982],
  31:[48852,4482],32:[53334,5232],33:[58566,5530],34:[64096,5898],35:[69994,6466],
  36:[76460,6648],37:[83108,8020],38:[91128,8194],39:[99322,8770],40:[108092,12052],
  41:[120144,13122],42:[133266,14206],43:[147472,15288],44:[162760,16366],45:[179126,17446],
  46:[196572,18796],47:[215368,20148],48:[235516,21494],49:[257010,22850],50:[279860,24196],
  51:[304056,44262],52:[348318,46664],53:[394982,49062],54:[444044,51464],55:[495508,53856],
  56:[549364,84392],57:[633756,87988],58:[721744,91592],59:[813336,95186],60:[908522,132916],
  61:[1041438,138914],62:[1180352,144904],63:[1325256,150928],64:[1476184,158116],65:[1634300,206646],
  66:[1840946,215648],67:[2056594,224648],68:[2281242,233638],69:[2514880,242650],70:[2757530,301976],
  71:[3059506,312778],72:[3372284,327172],73:[3699456,341574],74:[4041030,355990],75:[4397020,432084],
  76:[4829104,453100],77:[5282204,474100],78:[5756304,495100],79:[6251404,516100],80:[6767504,613820],
  81:[7381324,661830],82:[8043154,709798],83:[8752952,757856],84:[9510808,804830],85:[10316638,960552],
  86:[11277190,1083558],87:[12360748,999556],88:[13360304,1122554],89:[14482858,1170560],90:[15659418,1367290],
  91:[17026708,1426980],92:[18453688,1488592],93:[19941280,1546280],94:[21488570,1606288],95:[23095858,1665280],
  96:[24763138,1722000],97:[26490138,1787570],98:[28277708,1847288],99:[30124996,1907288],100:[32032284,0]
};

let accounts = [];

function loadAccounts() {
  const saved = localStorage.getItem('fflevel_accounts');
  if (saved) accounts = JSON.parse(saved);
  else accounts = [];
  renderMainAccounts();
}

function saveAccounts() {
  localStorage.setItem('fflevel_accounts', JSON.stringify(accounts));
}

function calculateProgress(totalExp) {
  let level = 1;
  let baseExp = 0;
  let needForNext = 48;

  for (let lvl = 1; lvl <= 100; lvl++) {
    if (EXP_TABLE[lvl]) {
      if (totalExp >= EXP_TABLE[lvl][0]) {
        level = lvl;
        baseExp = EXP_TABLE[lvl][0];
        needForNext = EXP_TABLE[lvl][1] || 0;
      } else break;
    }
  }

  const currentInLevel = totalExp - baseExp;
  const remaining = Math.max(0, needForNext - currentInLevel);
  const progress = needForNext > 0 ? (currentInLevel / needForNext) * 100 : 100;

  return { level, progress: progress.toFixed(2), currentInLevel, remaining, needForNext };
}

function getTimeUntilReset(sessionStart) {
  const now = Date.now();
  const resetTime = sessionStart + 24 * 60 * 60 * 1000;
  let remaining = Math.max(0, resetTime - now);

  const hours = Math.floor(remaining / (1000 * 60 * 60));
  remaining %= (1000 * 60 * 60);
  const minutes = Math.floor(remaining / (1000 * 60));
  remaining %= (1000 * 60);
  const seconds = Math.floor(remaining / 1000);

  return `\( {hours.toString().padStart(2, '0')}: \){minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
}

async function updateAccount(index) {
  const acc = accounts[index];
  try {
    const res = await fetch(`https://gojoinfoapi-mu.vercel.app/get?uid=${acc.uid}&region=RU`);
    const raw = await res.json();

    const captain = raw.captainBasicInfo || {};
    const accountInfo = raw.AccountInfo || {};

    const totalExpNow = parseInt(captain.exp || accountInfo.AccountEXP) || acc.lastExp;
    const nickname = captain.nickname || accountInfo.AccountName || acc.nickname;
    const likes = parseInt(accountInfo.AccountLikes || captain.liked) || 0;

    const now = Date.now();
    const hoursPassed = (now - acc.sessionStart) / (1000 * 60 * 60);

    if (hoursPassed >= 24) {
      acc.sessionStart = now;
      acc.sessionStartExp = totalExpNow;
      acc.todayExp = 0;
    }

    if (totalExpNow > acc.sessionStartExp) {
      acc.todayExp = totalExpNow - acc.sessionStartExp;
    } else {
      acc.todayExp = 0;
    }

    acc.lastExp = totalExpNow;
    acc.nickname = nickname;
    acc.likes = likes;
    acc.lastUpdateTime = now;

    const levelInfo = calculateProgress(totalExpNow);
    Object.assign(acc, levelInfo);

    saveAccounts();
    renderMainAccounts();

  } catch (e) {
    console.error("Ошибка обновления:", e);
  }
}

function renderMainAccounts() {
  const container = document.getElementById('mainAccounts');
  container.innerHTML = '';

  accounts.forEach((acc, index) => {
    const startExp = acc.sessionStartExp || acc.lastExp || 0;
    const timerText = getTimeUntilReset(acc.sessionStart);

    const cardHTML = `
      <div class="card p-6 space-y-6">
        <div class="flex items-center gap-4">
          <img src="avag.jpg" alt="Avatar" 
               class="w-20 h-20 rounded-2xl object-cover border-4 border-red-500 shadow-lg">
          
          <div class="flex-1">
            <div class="flex items-center gap-3">
              <h2 class="text-2xl font-bold">${acc.nickname}</h2>
              <span class="bg-emerald-600 text-white text-xs px-4 py-1 rounded-full flex items-center gap-1.5">
                <span class="w-2.5 h-2.5 bg-white rounded-full live-dot"></span> LIVE
              </span>
            </div>
            <p class="text-emerald-400 text-sm">UID: ${acc.uid}</p>
            <p class="text-emerald-400 text-xl font-semibold">Level ${acc.level}</p>
          </div>
        </div>

        <div>
          <div class="flex justify-between text-sm mb-1">
            <span class="text-green-400 font-semibold">${acc.progress || 0}% Progress</span>
            <span class="text-zinc-400">${(acc.currentInLevel || 0).toLocaleString('ru-RU')} / ${(acc.needForNext || 48).toLocaleString('ru-RU')} EXP</span>
          </div>
          <div class="progress-container">
            <div class="progress-bar" style="width: ${acc.progress || 0}%"></div>
          </div>
        </div>

        <div class="grid grid-cols-2 gap-4">
          <div class="bg-zinc-900 rounded-3xl p-5">
            <p class="text-zinc-400 text-xs">Current EXP</p>
            <p class="text-3xl font-bold">${acc.lastExp.toLocaleString('ru-RU')}</p>
          </div>
          <div class="bg-zinc-900 rounded-3xl p-5">
            <p class="text-zinc-400 text-xs">Remaining XP</p>
            <p class="text-3xl font-bold text-orange-400">${(acc.remaining || 0).toLocaleString('ru-RU')}</p>
          </div>
        </div>

        <div class="bg-zinc-900 rounded-3xl p-5 space-y-3 text-sm">
          <div class="flex justify-between">
            <span class="text-zinc-400">Было при добавлении:</span>
            <span class="font-medium">${startExp.toLocaleString('ru-RU')}</span>
          </div>
          <div class="flex justify-between text-green-400">
            <span>Добавилось за сессию:</span>
            <span class="font-bold">+${(acc.todayExp || 0).toLocaleString('ru-RU')}</span>
          </div>
          <div class="flex justify-between border-t border-zinc-700 pt-3">
            <span class="text-zinc-400">На данный момент:</span>
            <span class="font-bold">${acc.lastExp.toLocaleString('ru-RU')}</span>
          </div>
          <div class="flex justify-between border-t border-zinc-700 pt-3">
            <span class="text-zinc-400">❤️ Лайки аккаунта:</span>
            <span class="font-bold text-pink-400">${acc.likes ? acc.likes.toLocaleString('ru-RU') : '0'}</span>
          </div>
        </div>

        <div class="bg-zinc-900 rounded-3xl p-4 text-center">
          <p class="text-amber-400 text-sm mb-1">До сброса сессии:</p>
          <p class="font-mono text-3xl font-bold text-amber-300 tracking-widest">${timerText}</p>
        </div>

        <div class="flex gap-3">
          <button onclick="updateAccount(${index})" class="flex-1 bg-zinc-800 hover:bg-zinc-700 py-4 rounded-2xl text-sm">Обновить</button>
          <button onclick="deleteAccount(${index})" class="flex-1 bg-red-600 hover:bg-red-500 py-4 rounded-2xl text-sm">Delete</button>
        </div>
      </div>`;
    container.innerHTML += cardHTML;
  });
}

function deleteAccount(index) {
  if (confirm("Удалить этот аккаунт?")) {
    accounts.splice(index, 1);
    saveAccounts();
    renderMainAccounts();
  }
}

function addNewAccount() {
  const uid = document.getElementById('uidInput').value.trim();
  if (!uid) return alert("Введите UID!");
  if (accounts.some(a => a.uid === uid)) return alert("Этот UID уже добавлен!");

  const now = Date.now();

  accounts.push({
    uid: uid,
    lastExp: 0,
    todayExp: 0,
    sessionStart: now,
    sessionStartExp: 0,
    likes: 0,
    nickname: "Загрузка...",
    level: 1,
    progress: 0,
    currentInLevel: 0,
    remaining: 48,
    needForNext: 48
  });

  saveAccounts();
  renderMainAccounts();
  updateAccount(accounts.length - 1);
}

function refreshAll() {
  accounts.forEach((_, i) => updateAccount(i));
}

// Запуск
loadAccounts();
refreshAll();

// Автообновление данных каждые 30 секунд
setInterval(refreshAll, 30000);

// Обновление таймера каждую секунду
setInterval(() => {
  renderMainAccounts();
}, 1000);
</script>
</body>
</html>
