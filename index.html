<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FFLEVEL.PRO</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body { background: #0a0a0a; color: #ddd; font-family: system-ui, sans-serif; }
    .card { background: #111111; border-radius: 16px; }
    .progress-container { background: #1f1f1f; height: 10px; border-radius: 9999px; overflow: hidden; }
    .progress-bar { height: 100%; background: linear-gradient(90deg, #22c55e, #4ade80); transition: width 0.6s ease; }
    .live-dot { animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    .history-item { transition: all 0.2s; }
    .history-item:hover { background: #1a1a1a; }
  </style>
</head>
<body class="min-h-screen pb-24">

<div class="max-w-xl mx-auto pt-8 px-4">

  <!-- Header -->
  <div class="flex items-center justify-between mb-6">
    <div class="flex items-center gap-3">
      <div class="w-9 h-9 bg-gradient-to-br from-orange-500 to-red-500 rounded-2xl flex items-center justify-center text-xl">🔥</div>
      <h1 class="text-3xl font-bold tracking-tighter">FFLEVEL.PRO</h1>
    </div>
    <button onclick="refreshCurrent()" class="flex items-center gap-2 bg-zinc-800 hover:bg-zinc-700 px-6 py-2.5 rounded-2xl text-sm font-medium">
      <i class="fa-solid fa-rotate"></i> Refresh
    </button>
  </div>

  <!-- Search -->
  <div class="mb-8">
    <div class="flex gap-3">
      <input id="uidInput" type="text" placeholder="Введите UID" 
             class="flex-1 bg-zinc-900 border border-zinc-700 focus:border-green-500 rounded-3xl px-6 py-4 text-lg outline-none"
             onkeypress="if(event.key === 'Enter') addAndSearch()">
      <button onclick="addAndSearch()" 
              class="bg-green-500 hover:bg-green-600 px-10 py-4 rounded-3xl font-semibold text-black">
        Поиск
      </button>
    </div>
  </div>

  <!-- Current Result -->
  <div id="result" class="hidden card p-6 space-y-6 mb-8"></div>

  <!-- History -->
  <div class="mt-8">
    <h3 class="text-zinc-400 text-sm mb-3 flex items-center gap-2">
      <i class="fa-solid fa-history"></i> История аккаунтов
    </h3>
    <div id="historyList" class="space-y-3"></div>
  </div>
</div>

<script>
// ==================== EXP TABLE ====================
const EXP_TABLE = { /* Полная таблица до 100 уровня — оставил как раньше */ 
  1: [0,48],2:[48,154],3:[202,342],4:[544,468],5:[1012,832],6:[1844,948],
  7:[2792,1008],8:[3800,1070],9:[4870,1134],10:[6004,1188],
  11:[7192,1256],12:[8448,1328],13:[9776,1364],14:[11140,1426],15:[12566,1494],
  16:[14060,1550],17:[15610,1614],18:[17224,1678],19:[18902,1730],20:[20632,1792],
  21:[22424,2304],22:[24728,1464],23:[26192,1974],24:[28166,2034],25:[30200,2094],
  26:[32294,2154],27:[34448,3356],28:[37804,3370],29:[41174,3696],30:[44870,3982],
  31:[48852,4482],32:[53334,5232],33:[58566,5530],34:[64096,5898],35:[69994,6466],
  36:[76460,6648],37:[83108,8020],38:[91128,8194],39:[99322,8770],40:[108092,12052],
  41:[120144,13122],42:[133266,14206],43:[147472,15288],44:[162760,16366],45:[179126,17446],
  46:[196572,18796],47:[215368,20148],48:[235516,21494],49:[257010,22850],50:[279860,24196],
  51:[304056,44262],52:[348318,46664],53:[394982,49062],54:[444044,51464],55:[495508,53856],
  56:[549364,84392],57:[633756,87988],58:[721744,91592],59:[813336,95186],60:[908522,132916],
  61:[1041438,138914],62:[1180352,144904],63:[1325256,150928],64:[1476184,158116],65:[1634300,206646],
  66:[1840946,215648],67:[2056594,224648],68:[2281242,233638],69:[2514880,242650],70:[2757530,301976],
  71:[3059506,312778],72:[3372284,327172],73:[3699456,341574],74:[4041030,355990],75:[4397020,432084],
  76:[4829104,453100],77:[5282204,474100],78:[5756304,495100],79:[6251404,516100],80:[6767504,613820],
  81:[7381324,661830],82:[8043154,709798],83:[8752952,757856],84:[9510808,804830],85:[10316638,960552],
  86:[11277190,1083558],87:[12360748,999556],88:[13360304,1122554],89:[14482858,1170560],90:[15659418,1367290],
  91:[17026708,1426980],92:[18453688,1488592],93:[19941280,1546280],94:[21488570,1606288],95:[23095858,1665280],
  96:[24763138,1722000],97:[26490138,1787570],98:[28277708,1847288],99:[30124996,1907288],100:[32032284,0]
};

let history = []; // массив сохранённых аккаунтов

function saveToHistory(uid, data) {
  // Удаляем дубликат, если уже есть
  history = history.filter(item => item.uid !== uid);
  history.unshift({ uid, data, timestamp: Date.now() }); // добавляем в начало
  if (history.length > 20) history.pop(); // лимит 20 аккаунтов
  renderHistory();
}

function renderHistory() {
  const container = document.getElementById('historyList');
  container.innerHTML = '';

  history.forEach((item, index) => {
    const div = document.createElement('div');
    div.className = `history-item flex items-center justify-between bg-zinc-900 p-4 rounded-2xl cursor-pointer`;
    div.innerHTML = `
      <div class="flex items-center gap-4">
        <div class="text-green-400 text-sm">${item.uid}</div>
        <div>
          <div class="font-medium">${item.data.nickname || 'Unknown'}</div>
          <div class="text-xs text-zinc-500">Level ${item.data.level}</div>
        </div>
      </div>
      <button onclick="deleteFromHistory(${index}); event.stopImmediatePropagation();" 
              class="bg-red-600 hover:bg-red-500 px-4 py-2 rounded-xl text-sm">
        Удалить
      </button>
    `;
    div.onclick = () => loadFromHistory(item);
    container.appendChild(div);
  });
}

function deleteFromHistory(index) {
  history.splice(index, 1);
  renderHistory();
}

function loadFromHistory(item) {
  document.getElementById('uidInput').value = item.uid;
  showPlayerCard(item.data, item.uid);
}

// ==================== FETCH DATA ====================
async function fetchPlayerData(uid) {
  try {
    const res = await fetch(`https://gojoinfoapi-mu.vercel.app/get?uid=${uid}&region=RU`);
    const raw = await res.json();

    const captain = raw.captainBasicInfo || {};
    const account = raw.AccountInfo || {};

    const nickname = captain.nickname || account.AccountName || "Unknown Player";
    const level = parseInt(captain.level || account.AccountLevel) || 1;
    const totalExp = parseInt(captain.exp || account.AccountEXP) || 0;

    let baseExp = 0;
    let needForNext = 48;
    for (let lvl = 1; lvl <= 100; lvl++) {
      if (EXP_TABLE[lvl]) {
        if (totalExp >= EXP_TABLE[lvl][0]) {
          baseExp = EXP_TABLE[lvl][0];
          needForNext = EXP_TABLE[lvl][1] || 0;
        } else break;
      }
    }

    const currentInLevel = totalExp - baseExp;
    const remaining = Math.max(0, needForNext - currentInLevel);
    const progress = needForNext > 0 ? (currentInLevel / needForNext) * 100 : 100;

    const playerData = {
      nickname,
      level,
      totalExp,
      currentInLevel,
      remaining,
      progress: progress.toFixed(2),
      expInfo: `${currentInLevel} / ${needForNext}`
    };

    saveToHistory(uid, playerData);
    showPlayerCard(playerData, uid);

  } catch (e) {
    alert("Ошибка загрузки данных. Проверьте UID.");
    console.error(e);
  }
}

function showPlayerCard(data, uid) {
  const html = `
    <div class="flex items-center gap-4">
      <div class="w-16 h-16 bg-zinc-800 rounded-2xl flex items-center justify-center text-4xl border border-zinc-700">🔥</div>
      <div class="flex-1">
        <div class="flex items-center gap-3">
          <h2 class="text-2xl font-bold">${data.nickname}</h2>
          <span class="bg-emerald-600 text-white text-xs px-4 py-1 rounded-full flex items-center gap-1.5">
            <span class="w-2.5 h-2.5 bg-white rounded-full live-dot"></span> LIVE
          </span>
        </div>
        <p class="text-emerald-400">UID: ${uid}</p>
        <p class="text-emerald-400 text-xl">Level ${data.level}</p>
      </div>
    </div>

    <div>
      <div class="flex justify-between mb-1.5 text-sm">
        <span class="text-green-400 font-semibold">${data.progress}% Progress</span>
        <span class="text-zinc-400">${data.expInfo} EXP</span>
      </div>
      <div class="progress-container">
        <div class="progress-bar" style="width: ${data.progress}%"></div>
      </div>
    </div>

    <div class="grid grid-cols-2 gap-4">
      <div class="bg-zinc-900 rounded-3xl p-5">
        <p class="text-zinc-400 text-xs">Current EXP</p>
        <p class="text-4xl font-bold">${data.totalExp.toLocaleString('ru-RU')}</p>
      </div>
      <div class="bg-zinc-900 rounded-3xl p-5">
        <p class="text-zinc-400 text-xs">Remaining XP</p>
        <p class="text-4xl font-bold text-orange-400">${data.remaining.toLocaleString('ru-RU')}</p>
      </div>
    </div>

    <div class="bg-zinc-900 rounded-3xl p-5 flex justify-between items-center text-sm">
      <div>Token Expires: <span class="text-green-400">7h 59m (at 07:28)</span></div>
      <span class="bg-green-600 text-white text-xs px-6 py-1 rounded-full font-bold">SUCCESS</span>
    </div>

    <div class="bg-zinc-900 rounded-3xl p-5">
      <p class="text-green-400 font-medium">Total +0 EXP today</p>
      <p class="text-xs text-zinc-500">Level — → —</p>
    </div>

    <div class="flex gap-3">
      <button class="flex-1 bg-zinc-800 py-4 rounded-2xl flex items-center justify-center gap-2">
        <i class="fa-solid fa-bell"></i> Notify
      </button>
      <button onclick="togglePause(this)" class="flex-1 bg-zinc-800 py-4 rounded-2xl flex items-center justify-center gap-2">
        <i class="fa-solid fa-play"></i> Resume
      </button>
      <button onclick="deleteCurrent()" class="flex-1 bg-red-600 hover:bg-red-500 py-4 rounded-2xl flex items-center justify-center gap-2">
        <i class="fa-solid fa-trash"></i> Delete
      </button>
    </div>
  `;

  document.getElementById('result').innerHTML = html;
  document.getElementById('result').classList.remove('hidden');
}

function addAndSearch() {
  const uid = document.getElementById('uidInput').value.trim();
  if (!uid) return alert("Введите UID!");
  fetchPlayerData(uid);
}

function refreshCurrent() {
  const uid = document.getElementById('uidInput').value.trim();
  if (uid) fetchPlayerData(uid);
}

function togglePause(btn) {
  if (btn.innerHTML.includes('Resume')) {
    btn.innerHTML = `<i class="fa-solid fa-pause"></i> Pause`;
  } else {
    btn.innerHTML = `<i class="fa-solid fa-play"></i> Resume`;
  }
}

function deleteCurrent() {
  if (confirm("Удалить этот аккаунт из просмотра?")) {
    document.getElementById('result').classList.add('hidden');
    document.getElementById('uidInput').value = '';
  }
}

// Инициализация
renderHistory();

</script>
</body>
</html>
