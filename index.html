<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Free Fire Tracker</title>

<style>
body {
    margin:0;
    font-family: Arial;
    background: linear-gradient(180deg,#050816,#0b1c2c);
    color:white;
}

/* контейнер */
.container {
    padding:15px;
}

/* заголовок */
.title {
    font-size:22px;
    text-align:center;
    margin-bottom:20px;
    color:#00e5ff;
}

/* ввод */
.input-box {
    display:flex;
    gap:10px;
    margin-bottom:15px;
}

input {
    flex:1;
    padding:12px;
    border-radius:12px;
    border:none;
    background:#1a2a3a;
    color:white;
}

button {
    padding:12px;
    border:none;
    border-radius:12px;
    background:#00c8ff;
    color:white;
    cursor:pointer;
}

/* карточки */
.grid {
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
}

.card {
    background:#132536;
    border-radius:15px;
    padding:15px;
    box-shadow:0 0 10px rgba(0,255,255,0.2);
}

.card span {
    font-size:18px;
    color:#00e5ff;
}

/* профиль */
.profile {
    display:flex;
    align-items:center;
    gap:15px;
    margin-bottom:15px;
}

.avatar {
    width:80px;
    height:80px;
    border-radius:50%;
    border:2px solid #00e5ff;
}

/* прогресс */
.progress {
    height:10px;
    background:#222;
    border-radius:10px;
    overflow:hidden;
    margin-top:5px;
}

.bar {
    height:100%;
    width:0%;
    background:linear-gradient(90deg,#00ffcc,#00ff66);
}

/* блок */
.big-card {
    background:#0f2a3a;
    padding:15px;
    border-radius:15px;
    margin-top:15px;
}
</style>

</head>

<body>

<div class="container">

<div class="title">🔥 Free Fire Tracker</div>

<div class="input-box">
    <input id="uid" placeholder="Введите UID">
    <button onclick="loadData()">Старт</button>
</div>

<div class="profile">
    <img id="avatar" class="avatar" src="https://i.imgur.com/3ZQ3Z6F.png">
    <div>
        <div>ID: <span id="playerId">-</span></div>
        <div>Уровень: <span id="level">-</span></div>
    </div>
</div>

<div class="grid">
    <div class="card">🔥 Опыт<br><span id="xp">-</span></div>
    <div class="card">👍 Лайки<br><span id="likes">-</span></div>
    <div class="card">🎯 До уровня<br><span id="next">-</span></div>
    <div class="card">📊 Прогресс<br><span id="percent">0%</span></div>
</div>

<div class="big-card">
    Прогресс уровня
    <div class="progress">
        <div id="bar" class="bar"></div>
    </div>
</div>

</div>

<script>
async function loadData(){
    let uid = document.getElementById("uid").value;

    let res = await fetch(`https://flash-player-info.vercel.app/info?uid=${uid}&key=Flash`);
    let data = await res.json();

    // данные
    document.getElementById("playerId").innerText = data.accountId || uid;
    document.getElementById("level").innerText = data.level || "0";
    document.getElementById("likes").innerText = data.likes || "0";
    document.getElementById("xp").innerText = data.exp || "0";

    // пример расчета
    let current = data.exp || 0;
    let max = data.nextLevelExp || 100000;

    let percent = Math.floor((current / max) * 100);

    document.getElementById("percent").innerText = percent + "%";
    document.getElementById("next").innerText = max - current;

    document.getElementById("bar").style.width = percent + "%";

    // аватар (если API даст)
    if(data.avatar){
        document.getElementById("avatar").src = data.avatar;
    }
}
</script>

</body>
</html>
