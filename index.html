<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Free Fire EXP Live Tracker (RU API)</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { margin:0; font-family:Segoe UI, sans-serif; background:#020617; color:#e5e7eb; }
.container { max-width:1200px; margin:auto; padding:20px; }
h1 { text-align:center; color:#38bdf8; margin-bottom:10px; }
.subtitle { text-align:center; color:#94a3b8; margin-bottom:30px; font-size:14px; }
.search { display:flex; justify-content:center; gap:10px; margin-bottom:20px; }
input { padding:12px; width:280px; border-radius:8px; border:none; background:#1e293b; color:#e5e7eb; }
button { padding:12px 24px; border:none; border-radius:8px; background:#38bdf8; color:white; cursor:pointer; font-size:16px; font-weight:bold; }
button:hover { background:#0ea5e9; transform:translateY(-2px); }

.cards { display:grid; grid-template-columns:repeat(auto-fit, minmax(280px,1fr)); gap:15px; margin-bottom:20px; }
.card { background:#1e293b; border-radius:12px; padding:15px; box-shadow:0 4px 12px rgba(0,0,0,.3); border-left:4px solid #38bdf8; }
.card .value { font-size:20px; margin-top:6px; font-weight:bold; color:#38bdf8; }

.console { margin-top:20px; background:#0a101d; border-radius:12px; padding:15px; height:220px; overflow:auto; font-family:monospace; font-size:13px; border:1px solid #374151; }
canvas { background:#0f172a; border-radius:12px; padding:10px; margin-top:20px; border:1px solid #374151; }
</style>
</head>
<body>

<div class="container">
    <h1>🔥 Free Fire Level & EXP Live Tracker</h1>
    <div class="subtitle">Новый API • Регион RU • Реальное время</div>

    <div class="search">
        <input id="uid" placeholder="Введите UID (например: 9900005554)" value="9900005554">
        <button onclick="start()">Начать отслеживание</button>
    </div>

    <div class="cards">
        <div class="card">UID / Ник: <div class="value" id="name">-</div></div>
        <div class="card">Регион: <div class="value" id="region">-</div></div>
        <div class="card">Текущий уровень: <div class="value" id="level">-</div></div>
        <div class="card">Текущий EXP: <div class="value" id="exp">-</div></div>
        <div class="card">EXP за сессию: <div class="value" id="add">0</div></div>
        <div class="card">Следующий уровень: <div class="value" id="next">-</div></div>
        <div class="card">Нужно EXP: <div class="value" id="need">-</div></div>
        <div class="card">Осталось EXP: <div class="value" id="remain">-</div></div>
    </div>

    <div class="console" id="log"></div>
    <canvas id="chart" height="140"></canvas>
</div>

<script>
// ==================== EXP ТАБЛИЦА ====================
const EXP = {
1:[0,48],2:[48,154],3:[202,342],4:[544,468],5:[1012,832],6:[1844,948],
7:[2792,1008],8:[3800,1070],9:[4870,1134],10:[6004,1188],
11:[7192,1256],12:[8448,1328],13:[9776,1364],14:[11140,1426],
15:[12566,1494],16:[14060,1550],17:[15610,1614],18:[17224,1678],
19:[18902,1730],20:[20632,1792],21:[22424,2304],22:[24728,1464],
23:[26192,1974],24:[28166,2034],25:[30200,2094],26:[32294,2154],
27:[34448,3356],28:[37804,3370],29:[41174,3696],30:[44870,3982],
31:[48852,4482],32:[53334,5232],33:[58566,5530],34:[64096,5898],
35:[69994,6466],36:[76460,6648],37:[83108,8020],38:[91128,8194],
39:[99322,8770],40:[108092,12052],41:[120144,13122],42:[133266,14206],
43:[147472,15288],44:[162760,16366],45:[179126,17446],46:[196572,18796],
47:[215368,20148],48:[235516,21494],49:[257010,22850],50:[279860,24196],
51:[304056,44262],52:[348318,46664],53:[394982,49062],54:[444044,51464],
55:[495508,53856],56:[549364,84392],57:[633756,87988],58:[721744,91592],
59:[813336,95186],60:[908522,132916],61:[1041438,138914],
62:[1180352,144904],63:[1325256,150928],64:[1476184,158116],
65:[1634300,206646],66:[1840946,215648],67:[2056594,224648],
68:[2281242,233638],69:[2514880,242650],70:[2757530,301976],
71:[3059506,312778],72:[3372284,327172],73:[3699456,341574],
74:[4041030,355990],75:[4397020,432084],76:[4829104,453100],
77:[5282204,474100],78:[5756304,495100],79:[6251404,516100],
80:[6767504,613820],81:[7381324,661830],82:[8043154,709798],
83:[8752952,757856],84:[9510808,804830],85:[10316638,960552],
86:[11277190,1083558],87:[12360748,999556],88:[13360304,1122554],
89:[14482858,1170560],90:[15659418,1367290],91:[17026708,1426980],
92:[18453688,1488592],93:[19941280,1546280],94:[21488570,1606288],
95:[23095858,1665280],96:[24763138,1722000],97:[26490138,1787570],
98:[28277708,1847288],99:[30124996,1907288],100:[32032284,0]
};

// ==================== ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ====================
let lastExp = null;
let uid = null;
let timer = null;
let chart;
let totalSessionGain = 0;

// ==================== ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ====================
function log(t) {
    const l = document.getElementById("log");
    l.innerHTML += `[${new Date().toLocaleTimeString()}] ${t}<br>`;
    l.scrollTop = l.scrollHeight;
}

function calculateLevelFromExp(exp) {
    let level = 1;
    for (let lvl in EXP) {
        if (exp >= EXP[lvl][0]) level = parseInt(lvl);
        else break;
    }
    return level;
}

function initChart() {
    chart = new Chart(document.getElementById("chart"), {
        type: "line",
        data: { labels: [], datasets: [{ label: "EXP за минуту", data: [], borderColor: "#38bdf8", fill: true, tension: 0.4 }] },
        options: { responsive: true, scales: { y: { beginAtZero: true } } }
    });
}

// ==================== ОСНОВНАЯ ФУНКЦИЯ ЗАПРОСА (ИСПРАВЛЕНА) ====================
async function fetchData() {
    try {
        const apiUrl = `https://gojoinfoapi-mu.vercel.app/get?uid=${uid}&region=RU`;
        const r = await fetch(apiUrl);
        const d = await r.json();

        // Проверка ответа нового API
        if (!d || (!d.AccountInfo && !d.captainBasicInfo)) {
            log("❌ Ошибка API: Нет данных в ответе");
            console.log("Полный ответ:", d);
            return;
        }

        const acc = d.AccountInfo || {};
        const cap = d.captainBasicInfo || {};

        const exp = parseInt(acc.AccountEXP) || parseInt(cap.exp) || 0;
        const level = parseInt(acc.AccountLevel) || parseInt(cap.level) || calculateLevelFromExp(exp);
        const nickname = cap.nickname || acc.AccountName || uid;
        const region = acc.AccountRegion || cap.region || "RU";

        // Обновление интерфейса
        document.getElementById("name").textContent = nickname;
        document.getElementById("region").textContent = region;
        document.getElementById("level").textContent = level;
        document.getElementById("exp").textContent = exp.toLocaleString();

        // Расчёт EXP за сессию
        if (lastExp !== null) {
            let gained = exp - lastExp;
            if (gained > 0) {
                totalSessionGain += gained;
                document.getElementById("add").textContent = totalSessionGain.toLocaleString();
                log(`📈 +${gained.toLocaleString()} EXP`);
            }
        }

        // Прогресс до следующего уровня
        const base = EXP[level] ? EXP[level][0] : 0;
        const need = EXP[level] ? EXP[level][1] : 0;
        const cur = exp - base;
        const remaining = Math.max(0, need - cur);

        document.getElementById("next").textContent = level + 1;
        document.getElementById("need").textContent = need.toLocaleString();
        document.getElementById("remain").textContent = remaining.toLocaleString();

        lastExp = exp;

        log(`✅ Обновлено → Уровень: ${level} | EXP: ${exp.toLocaleString()}`);

    } catch (e) {
        log("❌ Ошибка соединения с API");
        console.error(e);
    }
}

// ==================== ЗАПУСК ====================
function start() {
    uid = document.getElementById("uid").value.trim();
    if (!uid) return alert("Введите UID!");

    if (timer) clearInterval(timer);
    totalSessionGain = 0;
    document.getElementById("add").textContent = "0";

    log(`🚀 Запущено отслеживание для UID: ${uid}`);
    fetchData();                    // первый запрос сразу
    timer = setInterval(fetchData, 45000); // обновление каждые 45 секунд
}

// ==================== ЗАГРУЗКА СТРАНИЦЫ ====================
window.onload = function() {
    initChart();
    log("✅ Сайт готов. Введите UID и нажмите «Начать отслеживание»");
    log("Используется API: gojoinfoapi-mu.vercel.app (регион RU)");
};
</script>
</body>
</html>
