<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FFGarouX</title>
<style>
  body { font-family: Arial; background: #05050d; color: #fff; margin:0; padding:0; }
  .container { max-width: 500px; margin: 50px auto; padding: 20px; background: #0e1022; border-radius: 10px; }
  input, button, textarea { width: 100%; margin: 10px 0; padding: 10px; border-radius: 5px; border: none; }
  button { cursor: pointer; background: linear-gradient(90deg, #ff3c3c, #00e0ff); color: #fff; font-weight: bold; }
  textarea { resize: none; }
  .reviews { margin-top: 20px; }
  .review { padding: 10px; background: #1a1c33; border-radius: 5px; margin-bottom: 10px; }
</style>
</head>
<body>
<div class="container" id="auth-container">
  <h2>FFGarouX</h2>
  <input type="text" id="nickname" placeholder="Ваш ник">
  <input type="password" id="password" placeholder="Пароль">
  <button id="register-btn">Регистрация</button>
  <button id="login-btn">Войти</button>
  <p id="auth-message"></p>
</div>

<div class="container" id="reviews-container" style="display:none;">
  <h2>Отзывы</h2>
  <textarea id="review-text" placeholder="Напишите отзыв..."></textarea>
  <button id="send-review">Отправить</button>
  <div class="reviews" id="reviews-list"></div>
  <button id="logout-btn" style="background:#ff4c4c;">Выйти</button>
</div>

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.3.1/firebase-app.js";
  import { getFirestore, collection, addDoc, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.3.1/firebase-firestore.js";

  // 🔥 Вставь сюда свой Firebase config
  const firebaseConfig = {
    apiKey: "AIzaSyCBZQzVUcx7-A5y7hgCvGjwhu4mfAWVEIE",
    authDomain: "ffgaroux-a58e7.firebaseapp.com",
    projectId: "ffgaroux-a58e7",
    storageBucket: "ffgaroux-a58e7.firebasestorage.app",
    messagingSenderId: "967486028392",
    appId: "1:967486028392:web:3de0f014b77d0ac27659dd",
    measurementId: "G-Y1VCLD1VKM"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  let currentUser = null;

  // DOM элементы
  const authContainer = document.getElementById('auth-container');
  const reviewsContainer = document.getElementById('reviews-container');
  const nicknameInput = document.getElementById('nickname');
  const passwordInput = document.getElementById('password');
  const authMessage = document.getElementById('auth-message');
  const reviewsList = document.getElementById('reviews-list');
  const reviewText = document.getElementById('review-text');

  // Регистрация
  document.getElementById('register-btn').onclick = async () => {
    const nick = nicknameInput.value.trim();
    const pass = passwordInput.value.trim();
    if(!nick || !pass) return authMessage.textContent = "Заполните оба поля!";
    
    try {
      // Сохраняем ник + пароль как документ (не безопасно для реального проекта, но для простого демо ок)
      await addDoc(collection(db, "users"), { nickname: nick, password: pass });
      authMessage.textContent = "Регистрация успешна! Теперь войдите.";
    } catch(e) {
      authMessage.textContent = "Ошибка регистрации!";
      console.error(e);
    }
  };

  // Вход
  document.getElementById('login-btn').onclick = async () => {
    const nick = nicknameInput.value.trim();
    const pass = passwordInput.value.trim();
    if(!nick || !pass) return authMessage.textContent = "Заполните оба поля!";

    try {
      const usersCol = collection(db, "users");
      const usersSnap = await getDocs(usersCol);
      let found = false;
      usersSnap.forEach(doc => {
        const data = doc.data();
        if(data.nickname === nick && data.password === pass) found = true;
      });
      if(found){
        currentUser = nick;
        authContainer.style.display = "none";
        reviewsContainer.style.display = "block";
        loadReviews();
      } else {
        authMessage.textContent = "Неверный ник или пароль!";
      }
    } catch(e){
      authMessage.textContent = "Ошибка входа!";
      console.error(e);
    }
  };

  // Отправка отзыва
  document.getElementById('send-review').onclick = async () => {
    const text = reviewText.value.trim();
    if(!text) return;
    try {
      await addDoc(collection(db, "reviews"), { nickname: currentUser, text: text, time: new Date().toISOString() });
      reviewText.value = "";
      loadReviews();
    } catch(e){
      console.error(e);
    }
  };

  // Загрузка отзывов
  async function loadReviews() {
    reviewsList.innerHTML = "";
    const q = query(collection(db, "reviews"), orderBy("time", "desc"));
    const querySnapshot = await getDocs(q);
    querySnapshot.forEach(doc => {
      const data = doc.data();
      const div = document.createElement('div');
      div.className = "review";
      div.textContent = `${data.nickname}: ${data.text}`;
      reviewsList.appendChild(div);
    });
  }

  // Выход
  document.getElementById('logout-btn').onclick = () => {
    currentUser = null;
    authContainer.style.display = "block";
    reviewsContainer.style.display = "none";
    nicknameInput.value = "";
    passwordInput.value = "";
    authMessage.textContent = "";
  };
</script>
</body>
</html>
