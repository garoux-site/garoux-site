<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GAROUX MODZ INFO BOT 2.0</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Anton&display=swap');
        body {
            margin:0; padding:0; background: linear-gradient(180deg, #0a0a1f, #1a0033); 
            color: #00ffff; font-family: 'Press Start 2P', sans-serif; overflow:hidden;
            height:100vh;
        }
        header {
            background: #000; padding:15px; text-align:center; border-bottom:3px solid #ff00ff;
            display:flex; align-items:center; justify-content:space-between; font-size:1.4em;
        }
        .logo { font-family:'Anton',sans-serif; font-size:2.2em; color:#00ffcc; text-shadow:0 0 20px #00ffcc; }
        
        .panel { background:rgba(0,0,0,0.85); margin:20px; border:3px solid #00ffff; border-radius:20px; padding:20px; box-shadow:0 0 30px #00ffff; }
        .neon-btn {
            padding:15px 25px; border:none; border-radius:15px; font-size:1.1em; cursor:pointer;
            transition: all 0.3s; box-shadow:0 0 15px;
        }
        .stop { background:linear-gradient(#ff0066,#ff3300); color:#fff; box-shadow:0 0 20px #ff0066; }
        .refresh { background:linear-gradient(#00ccff,#00ffff); color:#000; box-shadow:0 0 20px #00ffff; }
        .neon-btn:hover { transform:scale(1.1); box-shadow:0 0 40px; }
        
        .status-dot { display:inline-block; width:12px; height:12px; background:#00ff00; border-radius:50%; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%,100% {opacity:1;} 50% {opacity:0.3;} }
        
        .console {
            background:#000; border:3px solid #00ffcc; border-radius:15px; padding:15px; height:320px; 
            overflow-y:auto; font-size:0.95em; color:#00ffcc; line-height:1.6;
        }
        .console-line { margin:4px 0; animation: fadeIn 0.6s; }
        @keyframes fadeIn { from {opacity:0;} to {opacity:1;} }
        
        .progress { height:18px; background:#001122; border-radius:10px; overflow:hidden; margin:10px 0; }
        .bar { height:100%; background:linear-gradient(90deg,#00ffff,#00ffcc); animation: progressAnim 2s linear infinite; }
        @keyframes progressAnim { 0% {width:30%;} 50% {width:80%;} 100% {width:30%;} }
    </style>
</head>
<body>
    <header>
        <div style="display:flex;align-items:center;gap:15px;">
            <div style="width:50px;height:50px;background:linear-gradient(#ff00ff,#00ffff);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:2em;">📡</div>
            <div>
                <div class="logo">GAROUX MODZ</div>
                <div style="font-size:0.7em;color:#ff00ff;">INFO BOT 2.0</div>
            </div>
        </div>
        <div style="color:#00ff00;font-size:1.2em;">● RUNNING</div>
    </header>

    <div style="padding:0 20px;">
        <!-- BOT CONTROL -->
        <div class="panel">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:15px;">
                <h2 style="margin:0;color:#00ffff;">🤖 Управление инфо-ботом</h2>
                <div style="background:#00ff00;color:#000;padding:8px 20px;border-radius:30px;font-weight:bold;">RUNNING</div>
            </div>
            
            <div style="display:flex;gap:15px;flex-wrap:wrap;">
                <button onclick="toggleStop()" class="neon-btn stop">⏹ Остановить бота</button>
                <button onclick="refreshAll()" class="neon-btn refresh">🔄 Обновить данные</button>
                <button onclick="showDashboard()" class="neon-btn" style="background:linear-gradient(#00ff66,#00cc33);color:#000;">🏠 Главная панель</button>
            </div>
        </div>

        <!-- BOT DETAILS -->
        <div class="panel">
            <h3 style="color:#00ffff;">📋 Детали бота</h3>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;">
                <div><strong>Статус</strong><br><span style="color:#00ff00;">● Active</span></div>
                <div><strong>PID</strong><br><span id="pid">37</span></div>
                <div><strong>Запущен</strong><br><span id="started">00:00:00</span></div>
                <div><strong>Инстанс</strong><br><span id="instance">garoux_modz</span></div>
            </div>
        </div>

        <!-- LIVE CONSOLE -->
        <div class="panel">
            <h3 style="color:#00ffff;">📡 Живая консоль (обновление каждые 15 сек)</h3>
            <div class="progress"><div class="bar"></div></div>
            <div id="console" class="console"></div>
        </div>
    </div>

    <!-- МОДАЛЬНЫЙ ПРОФИЛЬ (при клике по строке) -->
    <div id="modal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.95);z-index:999;">
        <div style="background:#0a1329;margin:40px auto;width:90%;max-width:800px;border:5px solid #00ffff;border-radius:25px;padding:25px;">
            <button onclick="closeModal()" style="float:right;font-size:2em;color:#ff0000;">✕</button>
            <div id="modalContent"></div>
        </div>
    </div>

    <script>
        const API = "https://flash-player-info.vercel.app/info?uid=";
        const KEY = "&key=Flash";
        let accounts = [
            {uid: "7478766823"}, {uid: "ВАШ_UID_2"}, {uid: "ВАШ_UID_3"}, {uid: "ВАШ_UID_4"}
        ];
        let isRunning = true;
        let intervalId;

        function log(text) {
            const consoleEl = document.getElementById("console");
            const line = document.createElement("div");
            line.className = "console-line";
            line.innerHTML = `<span style="color:#ff00cc;">${new Date().toLocaleTimeString('ru-RU')}</span> ${text}`;
            consoleEl.appendChild(line);
            consoleEl.scrollTop = consoleEl.scrollHeight;
            if (consoleEl.children.length > 30) consoleEl.removeChild(consoleEl.children[0]);
        }

        async function refreshAll() {
            document.getElementById("console").innerHTML = "";
            log("🔄 Запуск обновления инфо-бота...");
            
            for (let acc of accounts) {
                const res = await fetch(API + acc.uid + KEY).then(r => r.json()).catch(()=>null);
                if (!res?.basicInfo) continue;
                const info = res.basicInfo;
                const status = (Date.now()/1000 - info.lastLoginAt < 600) ? "● ONLINE" : "● OFFLINE";
                
                const line = `UID: <span style="color:#00ffff;">\( {acc.uid}</span> | Ник: <b> \){info.nickname}</b> | Ур: ${info.level} | ${status}`;
                log(line);
                
                // Клик по строке открывает профиль
                const lastLine = document.getElementById("console").lastChild;
                lastLine.style.cursor = "pointer";
                lastLine.onclick = () => showProfile(info, acc.uid);
            }
            log("✅ Все аккаунты обновлены — READY");
        }

        function showProfile(info, uid) {
            const html = `
                <h2 style="text-align:center;color:#ffcc00;">⭐ ${info.nickname}</h2>
                <p>UID: ${uid}</p>
                <p>Уровень: ${info.level} | Лайки: ${info.liked}</p>
                <p>Рейтинг: ${info.rankingPoints} RP</p>
                <p style="color:#00ff00;">Статус: ONLINE</p>
                <button onclick="closeModal()" style="width:100%;padding:15px;background:#ffcc00;color:#000;border:none;border-radius:15px;">Закрыть</button>
            `;
            document.getElementById("modalContent").innerHTML = html;
            document.getElementById("modal").style.display = "block";
        }

        function closeModal() {
            document.getElementById("modal").style.display = "none";
        }

        function toggleStop() {
            isRunning = !isRunning;
            if (isRunning) {
                intervalId = setInterval(refreshAll, 15000);
                log("▶ Бот запущен снова");
            } else {
                clearInterval(intervalId);
                log("⏹ Бот остановлен");
            }
        }

        function showDashboard() {
            alert("📊 Главная панель GAROUX MODZ\n\nЗдесь будут все 4 аккаунта в будущем обновлении 😉");
        }

        // Авто-старт
        window.onload = () => {
            log("🚀 GAROUX MODZ INFO BOT запущен");
            log("Подключение к Free Fire API...");
            refreshAll();
            intervalId = setInterval(refreshAll, 15000);
            
            // Симуляция времени запуска
            let sec = 0;
            setInterval(() => {
                sec++;
                document.getElementById("started").textContent = `00:\( {String(Math.floor(sec/60)).padStart(2,'0')}: \){String(sec%60).padStart(2,'0')}`;
            }, 1000);
        };
    </script>
</body>
</html>
