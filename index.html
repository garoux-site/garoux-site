<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>FFLevel Tracker - GarouX</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
    body { margin:0; font-family: 'Segoe UI', sans-serif; background:#0a0f1c; color:#e0e0e0; }
    .container { max-width: 640px; margin: 20px auto; padding: 15px; }
    header { text-align:center; margin-bottom:20px; }
    .title { font-size:28px; font-weight:bold; color:#00ff9d; }
    .subtitle { color:#888; font-size:14px; }

    .card { background:#121a2a; border-radius:16px; padding:18px; margin-bottom:16px; box-shadow:0 4px 15px rgba(0,0,0,0.4); }
    .player-info { display:flex; align-items:center; gap:15px; margin-bottom:15px; }
    .avatar { width:80px; height:80px; border-radius:12px; background:#333; overflow:hidden; }
    .avatar img { width:100%; height:100%; object-fit:cover; }
    .nickname { font-size:24px; font-weight:bold; color:#00ff9d; }
    .uid { color:#aaa; font-size:15px; }

    .progress-container { margin:20px 0; }
    .progress-bar-bg { height:18px; background:#1e2a44; border-radius:999px; overflow:hidden; }
    .progress-bar { height:100%; background:linear-gradient(90deg, #00ff9d, #00cc7a); transition: width 0.6s ease; }
    .progress-text { display:flex; justify-content:space-between; margin-top:6px; font-size:15px; }

    .stats { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    .stat { background:#1e2a44; padding:12px; border-radius:12px; text-align:center; }
    .stat-label { font-size:13px; color:#888; }
    .stat-value { font-size:22px; font-weight:bold; color:#fff; margin-top:4px; }

    .live { background:#00ff9d; color:#000; padding:4px 12px; border-radius:999px; font-size:14px; font-weight:bold; display:inline-flex; align-items:center; gap:5px; }

    .log { margin-top:20px; background:#0a0f1c; border-radius:12px; padding:12px; height:180px; overflow:auto; font-family:monospace; font-size:13px; color:#0f0; }
</style>
</head>
<body>

<div class="container">
    <header>
        <div class="title">FFLEVEL TRACKER</div>
        <div class="subtitle">Реальное время • Обновление каждые 5 сек</div>
    </header>

    <div class="card">
        <div class="player-info">
            <div class="avatar">
                <!-- Можно добавить аватар позже -->
                <img src="https://via.placeholder.com/80/1e2a44/00ff9d?text=FF" alt="avatar">
            </div>
            <div>
                <div class="nickname" id="nickname">GarouX<span class="live" id="live" style="display:none;">LIVE</span></div>
                <div class="uid">UID: <span id="uid">-</span></div>
                <div style="margin-top:8px;">
                    <span style="background:#1e2a44; padding:4px 10px; border-radius:8px; font-size:14px;" id="region">RU</span>
                </div>
            </div>
        </div>

        <div style="text-align:center; margin:15px 0;">
            <div style="font-size:48px; font-weight:bold; color:#fff;" id="level">22</div>
            <div style="color:#00ff9d; font-size:18px;">LEVEL</div>
        </div>

        <div class="progress-container">
            <div class="progress-bar-bg">
                <div class="progress-bar" id="progressBar" style="width:90%"></div>
            </div>
            <div class="progress-text">
                <span id="currentExp">1731</span>
                <span id="percent">90.44%</span>
                <span id="needExp">1914</span>
            </div>
        </div>

        <div class="stats">
            <div class="stat">
                <div class="stat-label">EXP в минуту</div>
                <div class="stat-value" id="expPerMin">146</div>
            </div>
            <div class="stat">
                <div class="stat-label">Осталось до уровня</div>
                <div class="stat-value" id="remaining">183</div>
            </div>
        </div>

        <div style="margin-top:15px; text-align:center; color:#888; font-size:15px;">
            Примерное время: <span id="eta" style="color:#00ff9d; font-weight:bold;">2m</span>
        </div>
    </div>

    <div class="card">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <div><strong>Сегодня получено EXP:</strong></div>
            <div style="font-size:24px; color:#00ff9d;" id="totalToday">0</div>
        </div>
    </div>

    <div class="log" id="log"></div>
</div>

<script>
// ==================== EXP ТАБЛИЦА ====================
const EXP_TABLE = { /* Вставь сюда весь твой EXP объект из предыдущих сообщений */ 
1:[0,48],2:[48,154], /* ... продолжай до 100 */ };

// ==================== ПЕРЕМЕННЫЕ ====================
let uid = "15200904095"; // Можно менять
let lastExp = null;
let totalSessionGain = 0;
let lastUpdateTime = Date.now();
let timer = null;

// ==================== LOG ====================
function log(text) {
    const logEl = document.getElementById("log");
    logEl.innerHTML += `<span style="color:#0f0">[${new Date().toLocaleTimeString()}]</span> ${text}<br>`;
    logEl.scrollTop = logEl.scrollHeight;
}

// ==================== РАСЧЁТ УРОВНЯ И ПРОГРЕССА ====================
function calculateLevelAndProgress(exp) {
    let level = 1;
    for (let lvl in EXP_TABLE) {
        if (exp >= EXP_TABLE[lvl][0]) level = parseInt(lvl);
        else break;
    }
    const base = EXP_TABLE[level] ? EXP_TABLE[level][0] : 0;
    const need = EXP_TABLE[level] ? EXP_TABLE[level][1] : 0;
    const currentInLevel = exp - base;
    const percent = need > 0 ? Math.min(100, (currentInLevel / need) * 100) : 100;
    const remaining = Math.max(0, need - currentInLevel);

    return { level, currentInLevel, need, percent: percent.toFixed(2), remaining };
}

// ==================== ЗАПРОС К API ====================
async function fetchPlayerData() {
    try {
        const url = `https://gojoinfoapi-mu.vercel.app/get?uid=${uid}&region=RU`;
        const res = await fetch(url);
        const data = await res.json();

        const acc = data.AccountInfo || {};
        const cap = data.captainBasicInfo || {};

        const exp = parseInt(acc.AccountEXP) || parseInt(cap.exp) || 0;
        const nickname = cap.nickname || "Unknown";
        const playerUid = uid;

        // Расчёт прогресса
        const prog = calculateLevelAndProgress(exp);

        // Обновление интерфейса
        document.getElementById("nickname").textContent = nickname;
        document.getElementById("uid").textContent = playerUid;
        document.getElementById("level").textContent = prog.level;
        document.getElementById("currentExp").textContent = prog.currentInLevel;
        document.getElementById("needExp").textContent = prog.need;
        document.getElementById("percent").textContent = prog.percent + "%";
        document.getElementById("remaining").textContent = prog.remaining;
        document.getElementById("progressBar").style.width = prog.percent + "%";

        // EXP за минуту
        const now = Date.now();
        const minutesPassed = (now - lastUpdateTime) / 60000;
        let expPerMin = 0;
        if (lastExp !== null && minutesPassed > 0) {
            const gained = exp - lastExp;
            if (gained > 0) {
                totalSessionGain += gained;
                expPerMin = Math.round(gained / minutesPassed);
            }
        }
        document.getElementById("expPerMin").textContent = expPerMin || "-";

        // Примерное время до уровня (ETA)
        let eta = "—";
        if (expPerMin > 0) {
            const minutesLeft = Math.ceil(prog.remaining / expPerMin);
            eta = minutesLeft < 60 ? `\( {minutesLeft}m` : ` \){Math.floor(minutesLeft/60)}h ${minutesLeft%60}m`;
        }
        document.getElementById("eta").textContent = eta;

        document.getElementById("totalToday").textContent = totalSessionGain.toLocaleString();

        if (lastExp !== null && exp > lastExp) {
            log(`+${exp - lastExp} EXP`);
        }

        lastExp = exp;
        lastUpdateTime = now;

        // Показываем LIVE
        document.getElementById("live").style.display = "inline-flex";

    } catch (err) {
        log("Ошибка получения данных");
        console.error(err);
    }
}

// ==================== ЗАПУСК ====================
function startTracking() {
    if (timer) clearInterval(timer);
    log("🚀 Отслеживание запущено (обновление каждые 5 сек)");
    fetchPlayerData();
    timer = setInterval(fetchPlayerData, 5000); // каждые 5 секунд
}

window.onload = () => {
    startTracking();
};
</script>
</body>
</html>
