<!DOCTYPE html>
<html lang="ru">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FFGarouX</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body { 
      background: #0a0a0a; 
      color: #ddd; 
      font-family: system-ui, sans-serif; 
    }
    .card { 
      background: #111111; 
      border-radius: 16px; 
      perspective: 1000px;
    }
    .flip-card {
      position: relative;
      width: 100%;
      height: 100%;
      transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      transform-style: preserve-3d;
    }
    .flipped .flip-card {
      transform: rotateY(180deg);
    }
    .flip-card-front, .flip-card-back {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      border-radius: 16px;
    }
    .flip-card-front {
      background: #111111;
    }
    .flip-card-back {
      transform: rotateY(180deg);
      background: #0f172a;
      overflow-y: auto;
      max-height: 620px;
    }

    /* Остальные стили (site-title, glow-avatar, progress и т.д.) */
    .site-title {
      font-size: 2.85rem;
      font-weight: 900;
      letter-spacing: -2px;
      background: linear-gradient(135deg, #fbbf24, #f59e0b, #fb923c, #f97316, #fbbf24);
      background-size: 300% 300%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: titleDiagonal 7s linear infinite;
    }
    @keyframes titleDiagonal {
      0% { background-position: 0% 0%; }
      50% { background-position: 100% 100%; }
      100% { background-position: 0% 0%; }
    }

    .glow-avatar {
      position: relative;
      width: 80px;
      height: 80px;
      border-radius: 0;
      overflow: hidden;
      border: 2px solid #374151;
      box-shadow: 0 0 8px rgba(55, 65, 81, 0.5);
    }
    .glow-avatar img { width: 100%; height: 100%; object-fit: cover; }

    .progress-container { 
      background: #1f1f1f; 
      height: 10px; 
      border-radius: 9999px; 
      overflow: hidden; 
    }
    .progress-bar { 
      height: 100%; 
      background: linear-gradient(90deg, #166534, #4ade80, #22c55e, #4ade80);
      background-size: 200% 100%;
      animation: progressFlow 3s linear infinite;
    }
    @keyframes progressFlow {
      0% { background-position: 0% 50%; }
      100% { background-position: 200% 50%; }
    }

    .glow-btn {
      position: relative;
      overflow: hidden;
      transition: all 0.3s ease;
    }
    .glow-btn::before {
      content: '';
      position: absolute;
      top: -50%; left: -100%;
      width: 40%; height: 200%;
      background: linear-gradient(120deg, transparent, rgba(255,255,255,0.7), transparent);
      transition: 0.8s;
    }
    .glow-btn:hover::before { left: 200%; }

    .btn-green:hover { box-shadow: 0 0 20px #4ade80; transform: translateY(-2px); }
    .btn-red:hover   { box-shadow: 0 0 20px #ef4444; transform: translateY(-2px); }
    .btn-orange:hover{ box-shadow: 0 0 20px #f59e0b; transform: translateY(-2px); }

    .live-dot { animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

    .info-btn {
      position: absolute;
      top: 16px;
      right: 16px;
      z-index: 10;
    }
  </style>
</head>
<body class="min-h-screen pb-12">

<div class="max-w-xl mx-auto pt-8 px-4">

  <!-- Шапка -->
  <div class="flex items-center justify-between mb-8">
    <div class="flex items-center gap-3">
      <div class="w-10 h-10 rounded-2xl overflow-hidden border border-amber-500 flex-shrink-0 shadow-[0_0_15px_#f59e0b]">
        <img src="GAROUXa.jpg" alt="GAROUX" class="w-full h-full object-cover">
      </div>
      <h1 class="site-title">FFGarouX</h1>
    </div>
    <button onclick="refreshAll()" 
            class="glow-btn btn-orange flex items-center gap-2 bg-zinc-800 hover:bg-zinc-700 px-6 py-3 rounded-2xl text-sm font-medium">
      <i class="fa-solid fa-rotate"></i> Refresh All
    </button>
  </div>

  <div id="mainAccounts" class="space-y-8"></div>

  <div class="my-10">
    <div class="flex gap-3">
      <input id="uidInput" type="text" placeholder="Добавить новый UID"

      <button onclick="addNewAccount()"

    </div>

</div>

let accounts = [];

function loadAccounts() { /* без изменений */ 
  const saved = localStorage.getItem('fflevel_accounts');
  if (saved) accounts = JSON.parse(saved);
  else accounts = [];
  renderMainAccounts();
}

function saveAccounts() {
  localStorage.setItem('fflevel_accounts', JSON.stringify(accounts));
}

function calculateProgress(totalExp) { /* без изменений */ 
  // ... твой оригинальный calculateProgress
  let level = 1;
  let baseExp = 0;
  let needForNext = 48;

  for (let lvl = 1; lvl <= 100; lvl++) {
    if (EXP_TABLE[lvl]) {
      if (totalExp >= EXP_TABLE[lvl][0]) {
        level = lvl;
        baseExp = EXP_TABLE[lvl][0];
        needForNext = EXP_TABLE[lvl][1] || 0;
      } else break;
    }
  }

  const currentInLevel = totalExp - baseExp;
  const remaining = Math.max(0, needForNext - currentInLevel);
  const progress = needForNext > 0 ? (currentInLevel / needForNext) * 100 : 100;

  return { level, progress: progress.toFixed(2), currentInLevel, remaining, needForNext };
}

function getTimeUntilReset(sessionStart) { /* без изменений */ 
  const now = Date.now();
  const resetTime = sessionStart + 24 * 60 * 60 * 1000;
  const remaining = Math.max(0, resetTime - now);
  const hours = Math.floor(remaining / (1000 * 60 * 60));
  const minutes = Math.floor((remaining % (1000 * 60 * 60)) / (1000 * 60));
  return `${hours}ч ${minutes}м`;
}

// ==================== НОВАЯ ФУНКЦИЯ ДЛЯ ПОЛНОЙ ИНФОРМАЦИИ ====================
async function getFullInfo(uid) {
  try {
    const res = await fetch(`https://gojoinfoapi-mu.vercel.app/get?uid=${uid}&region=RU`);
    const data = await res.json();
    return data;
  } catch (e) {
    console.error(e);
    return null;
  }
}

function formatFullProfile(uid, data) {
  // Здесь используется почти твой оригинальный формат из бота
  const account = data.AccountInfo || {};
  const profile = data.AccountProfileInfo || {};
  const guild = data.GuildInfo || {};
  const captain = data.captainBasicInfo || {};
  const credit = data.creditScoreInfo || {};
  const pet = data.petInfo || {};
  const social = data.socialinfo || {};

  const outfit_ids = profile.EquippedOutfit || [];
  const outfit_text = outfit_ids.length ? outfit_ids.slice(0,3).join(", ") + (outfit_ids.length > 3 ? "..." : "") : "None";

  const skills = profile.EquippedSkills || [];
  const skill_text = skills.length ? `${Math.floor(skills.length/4)} комплектов` : "None";

  return `
<div class="p-6 text-sm leading-relaxed">
  <b>👤 ПОДРОБНЫЙ ПРОФИЛЬ ИГРОКА</b>
  <pre class="text-xs mt-3 whitespace-pre-wrap break-words">
──────────👾 GAROUX MODZ 👾───────────
🎮 Основная информация
🔹 Никнейм      : ${account.AccountName || captain.nickname || '—'}
🆔 UID           : ${uid}
🌍 Регион        : RU
📈 Уровень       : ${account.AccountLevel || '—'} (Exp: ${account.AccountEXP || '—'})
❤️ Лайки         : ${account.AccountLikes || '0'}
🏷️ Title ID      : ${account.Title || 'None'}
✍️ Подпись       : 
${social.signature ? social.signature.replace(/<br>/g, '\n') : 'Нет'}

🕒 Активность
📅 Создан        : ${account.AccountCreateTime ? new Date(account.AccountCreateTime*1000).toLocaleString('ru-RU') : '—'}
♻️ Последний вход: ${account.AccountLastLogin ? new Date(account.AccountLastLogin*1000).toLocaleString('ru-RU') : '—'}
🧾 Версия OB     : ${account.ReleaseVersion || '—'}

🏅 Рейтинг
🏹 КБ Рейтинг       : ${account.BrRankPoint || '—'}
🔫 БО Рейтинг       : ${account.CsRankPoint || '—'}
🎯 Максимальный КБ : ${account.BrMaxRank || '—'}
🎯 Максимальный БО : ${account.CsMaxRank || '—'}
🔁 Сезон         : ${account.AccountSeasonId || '—'}

🎨 Стиль и аватар
🖼️ Аватар ID     : ${account.AccountAvatarId || '—'}
🪧 Баннер ID     : ${account.AccountBannerId || 'Не установлен'}
🔫 Скин оружия   : ${account.EquippedWeapon ? account.EquippedWeapon[0] : '—'}
👕 Одежда        : ${outfit_text}
⚡ Навыки        : ${skill_text}

💎 Кредиты
💠 Credit Score  : ${credit.creditScore || '—'}

🐾 Питомец
🐶 Экипирован    : ${pet.isSelected ? "✅ Да" : "❌ Нет"}
🆔 ID питомца    : ${pet.id || '—'}
📈 Уровень       : ${pet.level || '—'}

🏰 Гильдия
🏷️ Название     : ${guild.GuildName || 'Нет'}
🆔 ID гильдии    : ${guild.GuildID || '—'}
👥 Участники     : \( {guild.GuildMember || 0}/ \){guild.GuildCapacity || '—'}

</div>`;
}

// ==================== RENDER ====================
function renderMainAccounts() {
  const container = document.getElementById('mainAccounts');
  container.innerHTML = '';

  accounts.forEach((acc, index) => {
    const startExp = acc.sessionStartExp || acc.lastExp || 0;
    const timerText = getTimeUntilReset(acc.sessionStart);

    const cardHTML = `
      <div class="card p-6 relative" id="card-${index}">
        <div class="flip-card" id="flip-${index}">

          <!-- FRONT (уровень) -->
          <div class="flip-card-front p-6 space-y-6">

                    class="info-btn bg-zinc-800 hover:bg-zinc-700 text-white px-3 py-1.5 rounded-xl text-xs flex items-center gap-1">

            </button>

              </div>

                <p class="text-3xl font-bold text-orange-400">${(acc.remaining || 0).toLocaleString('ru-RU')}</p>
              </div>
            </div>

            <div class="bg-zinc-900 rounded-3xl p-5 space-y-3">
              <div class="flex justify-between">

              </div>
              <div class="flex justify-between text-green-400">
                <span>Добавилось за сессию:</span>
                <span class="font-bold">+${(acc.todayExp || 0).toLocaleString('ru-RU')}</span>
              </div>
              <div class="flex justify-between border-t border-zinc-700 pt-3">
                <span class="text-zinc-400">На данный момент:</span>

              </div>

                      class="glow-btn btn-green flex-1 bg-zinc-800 py-4 rounded-2xl text-sm font-medium">Обновить</button>
              <button onclick="deleteAccount(${index}); event.stopImmediatePropagation()" 
                      class="glow-btn btn-red flex-1 bg-red-600 py-4 rounded-2xl text-sm font-medium">Delete</button>
            </div>

          <div class="flip-card-back p-6" id="back-${index}">
            <button onclick="toggleFlip(${index})" 
                    class="absolute top-4 right-4 bg-zinc-800 hover:bg-zinc-700 px-4 py-2 rounded-xl text-sm">
              ← Назад
            </button>
            <div class="pt-10" id="full-info-${index}">
              <p class="text-center text-zinc-400">Загрузка полной информации...</p>
            </div>
          </div>

        </div>
      </div>`;

    container.innerHTML += cardHTML;
  });
}

function toggleFlip(index) {
  const card = document.getElementById(`card-${index}`);
  card.classList.toggle('flipped');

  // Если перевернули на заднюю сторону и информация ещё не загружена
  if (card.classList.contains('flipped')) {
    const uid = accounts[index].uid;
    const backContent = document.getElementById(`full-info-${index}`);
    
    if (backContent.innerHTML.includes('Загрузка')) {
      getFullInfo(uid).then(data => {
        if (data) {
          backContent.innerHTML = formatFullProfile(uid, data);
        } else {
          backContent.innerHTML = `<p class="text-red-400 text-center">Не удалось загрузить информацию</p>`;
        }
      });
    }
  }
}

function deleteAccount(index) {
  if (confirm("Удалить этот аккаунт?")) {
    accounts.splice(index, 1);
    saveAccounts();
    renderMainAccounts();

}

function refreshAll() {
  accounts.forEach((_, i) => updateAccount(i));
