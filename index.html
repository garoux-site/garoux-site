<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Панель управления спамом</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            padding: 15px;
            margin: 0;
        }
        .container {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 600px;
            margin: 0 auto;
        }
        h1 { text-align: center; color: #333; margin-bottom: 25px; }
        label { display: block; margin: 15px 0 6px; font-weight: bold; }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px;
        }
        button {
            margin: 12px 6px 12px 0;
            padding: 14px 20px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            color: white;
        }
        .btn-start { background: #4CAF50; }
        .btn-stop  { background: #f44336; }
        .btn-status { background: #2196F3; }
        button:hover { opacity: 0.9; }
        #result {
            margin-top: 20px;
            padding: 15px;
            background: #f9f9f9;
            border: 1px solid #ddd;
            border-radius: 8px;
            min-height: 120px;
            white-space: pre-wrap;
            word-break: break-all;
            font-family: monospace;
        }
        .error { color: #d32f2f; }
        .success { color: #2e7d32; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔧 Панель управления</h1>

        <label>Base URL (меняется каждый раз):</label>
        <input type="text" id="baseUrl" value="http://100.98.84.47:5000" placeholder="http://100.98.84.47:5000">

        <label>User ID:</label>
        <input type="text" id="userId" value="9900005554" placeholder="123456789">

        <label>Duration (время):</label>
        <input type="number" id="duration" value="4" min="1">

        <div>
            <button class="btn-start" onclick="sendSpam()">▶️ START / SPAM</button>
            <button class="btn-stop" onclick="sendStop()">⏹️ STOP</button>
            <button class="btn-status" onclick="sendStatus()">📊 STATUS</button>
        </div>

        <div id="result">Результат появится здесь...</div>
    </div>

    <script>
        function getBaseUrl() {
            let url = document.getElementById('baseUrl').value.trim();
            if (url && !url.endsWith('/')) url += '/';
            return url;
        }

        function showResult(message, isError = false) {
            const div = document.getElementById('result');
            div.innerHTML = `<strong>${isError ? '❌ Ошибка' : '✅ Результат'}</strong><br><br>` + 
                            message.replace(/\n/g, '<br>');
            div.className = isError ? 'error' : 'success';
        }

        async function makeRequest(endpoint, params = '') {
            const base = getBaseUrl();
            if (!base) {
                showResult('Укажи Base URL!', true);
                return;
            }

            let fullUrl = base + endpoint;
            if (params) {
                fullUrl += (endpoint.includes('?') ? '&' : '?') + params;
            }

            showResult(`Отправляю запрос:<br><code>${fullUrl}</code><br><br>Ожидай...`);

            try {
                // Пробуем с no-cors (часто работает для локальных IP на Android)
                const response = await fetch(fullUrl, { 
                    method: 'GET',
                    mode: 'no-cors',
                    cache: 'no-cache'
                });

                showResult(`✅ Запрос успешно отправлен!<br>URL: ${fullUrl}<br><br>Если сервер работает — действие должно выполниться.<br>Проверь логи своего сервера.`);
            } catch (err) {
                showResult(`❌ Не удалось отправить запрос.<br>URL: ${fullUrl}<br>Ошибка: ${err.message}`, true);
            }
        }

        function sendSpam() {
            const userId = document.getElementById('userId').value.trim();
            const duration = document.getElementById('duration').value.trim();

            if (!userId) return showResult('Введи User ID!', true);
            if (!duration) return showResult('Введи Duration!', true);

            makeRequest('spam', `user_id=\( {userId}&duration= \){duration}`);
        }

        function sendStop() {
            const userId = document.getElementById('userId').value.trim();
            if (!userId) return showResult('Введи User ID!', true);
            makeRequest('stop', `user_id=${userId}`);
        }

        function sendStatus() {
            makeRequest('status');
        }

        // Горячие клавиши (Enter в полях)
        document.getElementById('userId').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') sendSpam();
        });
    </script>
</body>
</html>
