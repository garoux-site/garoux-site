<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FFGarouX</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body { 
      background: #0a0a0a; 
      color: #ddd; 
      font-family: system-ui, sans-serif; 
    }
    .card { 
      background: #111111; 
      border-radius: 20px; 
      perspective: 1200px;
      overflow: hidden;
    }

    .flip-card {
      position: relative;
      width: 100%;
      transition: transform 0.8s cubic-bezier(0.23, 1, 0.32, 1);
      transform-style: preserve-3d;
    }
    .flipped .flip-card {
      transform: rotateY(180deg);
    }

    .flip-card-front, .flip-card-back {
      position: absolute;
      width: 100%;
      backface-visibility: hidden;
      border-radius: 20px;
    }
    .flip-card-front {
      background: #111111;
    }
    .flip-card-back {
      transform: rotateY(180deg);
      background: linear-gradient(180deg, #1e2937, #0f172a);
    }

    .site-title {
      font-size: 2.85rem;
      font-weight: 900;
      letter-spacing: -2px;
      background: linear-gradient(135deg, #fbbf24, #f59e0b, #fb923c, #f97316, #fbbf24);
      background-size: 300% 300%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: titleDiagonal 7s linear infinite;
    }
    @keyframes titleDiagonal {
      0% { background-position: 0% 0%; }
      50% { background-position: 100% 100%; }
      100% { background-position: 0% 0%; }
    }

    .glow-avatar {
      width: 80px; height: 80px;
      border: 3px solid #f59e0b;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 0 15px rgba(245, 158, 11, 0.4);
    }

    .progress-container { 
      background: #1f1f1f; 
      height: 8px; 
      border-radius: 9999px; 
      overflow: hidden; 
    }
    .progress-bar { 
      height: 100%; 
      background: linear-gradient(90deg, #4ade80, #22c55e);
      animation: progressFlow 3s linear infinite;
    }
    @keyframes progressFlow {
      0% { background-position: 0% 50%; }
      100% { background-position: 200% 50%; }
    }

    .glow-btn {
      position: relative;
      overflow: hidden;
      transition: all 0.3s ease;
    }
    .glow-btn::before {
      content: '';
      position: absolute;
      top: -50%; left: -100%;
      width: 40%; height: 200%;
      background: linear-gradient(120deg, transparent, rgba(255,255,255,0.6), transparent);
      transition: 0.8s;
    }
    .glow-btn:hover::before { left: 200%; }

    .info-btn {
      position: absolute;
      top: 18px;
      right: 18px;
      z-index: 30;
    }
  </style>
</head>
<body class="min-h-screen pb-12 bg-black">

<div class="max-w-xl mx-auto pt-6 px-4">

  <!-- Header -->
  <div class="flex items-center justify-between mb-8">
    <div class="flex items-center gap-3">
      <div class="w-11 h-11 rounded-2xl overflow-hidden border-2 border-orange-500 shadow-lg">
        <img src="GAROUXa.jpg" alt="GAROUX" class="w-full h-full object-cover">
      </div>
      <h1 class="site-title text-3xl">FFGarouX</h1>
    </div>
    <button onclick="refreshAll()" 
            class="glow-btn flex items-center gap-2 bg-zinc-900 hover:bg-zinc-800 px-6 py-3 rounded-3xl text-sm font-medium">
      <i class="fa-solid fa-rotate"></i> Refresh All
    </button>
  </div>

  <div id="mainAccounts" class="space-y-8"></div>

  <!-- Add new UID -->
  <div class="my-10">
    <div class="flex gap-3">
      <input id="uidInput" type="text" placeholder="Добавить новый UID" 
             class="flex-1 bg-zinc-900 border border-zinc-700 focus:border-orange-500 rounded-3xl px-6 py-4 text-lg outline-none">
      <button onclick="addNewAccount()" 
              class="glow-btn bg-green-500 hover:bg-green-600 px-10 py-4 rounded-3xl font-semibold text-black">
        Добавить
      </button>
    </div>
  </div>
</div>

<script>
// ==================== EXP TABLE ====================
const EXP_TABLE = { /* Ваш EXP_TABLE полностью */ 
  1: [0,48],2:[48,154],3:[202,342],4:[544,468],5:[1012,832],
  6:[1844,948],7:[2792,1008],8:[3800,1070],9:[4870,1134],10:[6004,1188],
  11:[7192,1256],12:[8448,1328],13:[9776,1364],14:[11140,1426],15:[12566,1494],
  16:[14060,1550],17:[15610,1614],18:[17224,1678],19:[18902,1730],20:[20632,1792],
  21:[22424,2304],22:[24728,1464],23:[26192,1974],24:[28166,2034],25:[30200,2094],
  26:[32294,2154],27:[34448,3356],28:[37804,3370],29:[41174,3696],30:[44870,3982],
  31:[48852,4482],32:[53334,5232],33:[58566,5530],34:[64096,5898],35:[69994,6466],
  36:[76460,6648],37:[83108,8020],38:[91128,8194],39:[99322,8770],40:[108092,12052],
  41:[120144,13122],42:[133266,14206],43:[147472,15288],44:[162760,16366],45:[179126,17446],
  46:[196572,18796],47:[215368,20148],48:[235516,21494],49:[257010,22850],50:[279860,24196],
  51:[304056,44262],52:[348318,46664],53:[394982,49062],54:[444044,51464],55:[495508,53856],
  56:[549364,84392],57:[633756,87988],58:[721744,91592],59:[813336,95186],60:[908522,132916],
  61:[1041438,138914],62:[1180352,144904],63:[1325256,150928],64:[1476184,158116],65:[1634300,206646],
  66:[1840946,215648],67:[2056594,224648],68:[2281242,233638],69:[2514880,242650],70:[2757530,301976],
  71:[3059506,312778],72:[3372284,327172],73:[3699456,341574],74:[4041030,355990],75:[4397020,432084],
  76:[4829104,453100],77:[5282204,474100],78:[5756304,495100],79:[6251404,516100],80:[6767504,613820],
  81:[7381324,661830],82:[8043154,709798],83:[8752952,757856],84:[9510808,804830],85:[10316638,960552],
  86:[11277190,1083558],87:[12360748,999556],88:[13360304,1122554],89:[14482858,1170560],90:[15659418,1367290],
  91:[17026708,1426980],92:[18453688,1488592],93:[19941280,1546280],94:[21488570,1606288],95:[23095858,1665280],
  96:[24763138,1722000],97:[26490138,1787570],98:[28277708,1847288],99:[30124996,1907288],100:[32032284,0]
};

let accounts = [];

function loadAccounts() {
  const saved = localStorage.getItem('fflevel_accounts');
  accounts = saved ? JSON.parse(saved) : [];
  renderMainAccounts();
}

function saveAccounts() {
  localStorage.setItem('fflevel_accounts', JSON.stringify(accounts));
}

function calculateProgress(totalExp) {
  let level = 1, baseExp = 0, needForNext = 48;
  for (let lvl = 1; lvl <= 100; lvl++) {
    if (EXP_TABLE[lvl] && totalExp >= EXP_TABLE[lvl][0]) {
      level = lvl;
      baseExp = EXP_TABLE[lvl][0];
      needForNext = EXP_TABLE[lvl][1] || 0;
    } else break;
  }
  const current = totalExp - baseExp;
  const remaining = Math.max(0, needForNext - current);
  const progress = needForNext > 0 ? (current / needForNext * 100).toFixed(1) : 100;
  return { level, progress, currentInLevel: current, remaining, needForNext };
}

function getTimeUntilReset(sessionStart) {
  const remaining = Math.max(0, sessionStart + 86400000 - Date.now());
  const h = Math.floor(remaining / 3600000);
  const m = Math.floor((remaining % 3600000) / 60000);
  return `${h}ч ${m}м`;
}

async function getFullInfo(uid) {
  try {
    const res = await fetch(`https://gojoinfoapi-mu.vercel.app/get?uid=${uid}&region=RU`);
    return await res.json();
  } catch (e) {
    return null;
  }
}

function formatFullProfile(uid, data) {
  const a = data.AccountInfo || data;
  return `
    <div class="p-6 space-y-6 text-sm">
      <div class="flex items-center justify-between">
        <div>
          <div class="text-blue-400 font-semibold text-lg">ПОДРОБНЫЙ ПРОФИЛЬ</div>
          <div class="text-zinc-400 text-xs">GAROUX MODZ</div>
        </div>
      </div>

      <div class="space-y-4">
        <div class="flex justify-between">
          <span class="text-zinc-400">Никнейм</span>
          <span class="font-medium">${a.AccountName || '—'}</span>
        </div>
        <div class="flex justify-between">
          <span class="text-zinc-400">UID</span>
          <span class="font-medium">${uid}</span>
        </div>
        <div class="flex justify-between">
          <span class="text-zinc-400">Регион</span>
          <span class="font-medium">RU</span>
        </div>
        <div class="flex justify-between">
          <span class="text-zinc-400">Уровень</span>
          <span class="font-medium">${a.AccountLevel || '—'} <span class="text-zinc-500">(Exp: ${a.AccountEXP || '—'})</span></span>
        </div>
        <div class="flex justify-between">
          <span class="text-zinc-400">Лайки</span>
          <span class="font-medium text-pink-400">${(a.AccountLikes || 0).toLocaleString('ru-RU')}</span>
        </div>
      </div>

      <div class="pt-4 border-t border-zinc-700">
        <div class="text-xs text-zinc-400 mb-2">ДОПОЛНИТЕЛЬНАЯ ИНФОРМАЦИЯ</div>
        <div class="grid grid-cols-2 gap-3 text-xs">
          <div>Создан: ${a.AccountCreateTime ? new Date(a.AccountCreateTime*1000).toLocaleDateString('ru-RU') : '—'}</div>
          <div>Последний вход: ${a.AccountLastLogin ? new Date(a.AccountLastLogin*1000).toLocaleDateString('ru-RU') : '—'}</div>
        </div>
      </div>
    </div>`;
}

function renderMainAccounts() {
  const container = document.getElementById('mainAccounts');
  container.innerHTML = '';

  accounts.forEach((acc, index) => {
    const startExp = acc.sessionStartExp || acc.lastExp || 0;
    const timerText = getTimeUntilReset(acc.sessionStart);

    const cardHTML = `
      <div class="card" id="card-${index}">
        <div class="flip-card" id="flip-${index}">

          <!-- FRONT -->
          <div class="flip-card-front p-6 space-y-5">
            <button onclick="toggleFlip(${index});event.stopImmediatePropagation()" 
                    class="info-btn bg-zinc-800 hover:bg-zinc-700 text-white px-5 py-2 rounded-2xl text-sm flex items-center gap-2 shadow">
              <i class="fa-solid fa-info-circle"></i> Info
            </button>

            <div class="flex items-center gap-4">
              <div class="glow-avatar flex-shrink-0">
                <img src="avag.jpg" alt="" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 100 100%27%3E%3Ctext y=%27.9em%27 font-size=%2790%27%3E🔥%3C/text%3E%3C/svg%27';">
              </div>
              <div class="flex-1">
                <h2 class="text-2xl font-bold">${acc.nickname}</h2>
                <p class="text-emerald-400">UID: ${acc.uid}</p>
                <p class="text-2xl text-emerald-400 font-semibold">Level ${acc.level}</p>
              </div>
            </div>

            <div>
              <div class="flex justify-between text-sm mb-1.5">
                <span class="text-green-400">${acc.progress}%</span>
                <span class="text-zinc-400">${acc.currentInLevel.toLocaleString('ru-RU')} / ${acc.needForNext.toLocaleString('ru-RU')}</span>
              </div>
              <div class="progress-container"><div class="progress-bar" style="width: ${acc.progress}%"></div></div>
            </div>

            <div class="grid grid-cols-2 gap-4">
              <div class="bg-zinc-900 rounded-2xl p-4">
                <p class="text-xs text-zinc-400">Current EXP</p>
                <p class="text-xl font-bold">${acc.lastExp.toLocaleString('ru-RU')}</p>
              </div>
              <div class="bg-zinc-900 rounded-2xl p-4">
                <p class="text-xs text-zinc-400">Remaining</p>
                <p class="text-orange-400 text-xl font-bold">${acc.remaining.toLocaleString('ru-RU')}</p>
              </div>
            </div>

            <div class="bg-zinc-900 rounded-2xl p-5 space-y-3 text-sm">
              <div class="flex justify-between">
                <span class="text-zinc-400">Было при добавлении:</span>
                <span>${startExp.toLocaleString('ru-RU')}</span>
              </div>
              <div class="flex justify-between text-lime-400">
                <span>Добавилось за сессию:</span>
                <span class="font-bold">+${(acc.todayExp||0).toLocaleString('ru-RU')}</span>
              </div>
              <div class="flex justify-between border-t border-zinc-700 pt-3">
                <span class="text-zinc-400">На данный момент:</span>
                <span class="font-bold">${acc.lastExp.toLocaleString('ru-RU')}</span>
              </div>
              <div class="flex justify-between border-t border-zinc-700 pt-3">
                <span class="text-zinc-400">❤️ Лайки:</span>
                <span class="text-pink-400 font-bold">${(acc.likes||0).toLocaleString('ru-RU')}</span>
              </div>
            </div>

            <div class="text-center text-amber-400 text-sm py-2">
              До сброса: <span class="font-medium">${timerText}</span>
            </div>

            <div class="flex gap-3">
              <button onclick="updateAccount(${index});event.stopImmediatePropagation()" 
                      class="flex-1 bg-zinc-800 hover:bg-zinc-700 py-4 rounded-2xl text-sm font-medium">Обновить</button>
              <button onclick="deleteAccount(${index});event.stopImmediatePropagation()" 
                      class="flex-1 bg-red-600 hover:bg-red-500 py-4 rounded-2xl text-sm font-medium">Delete</button>
            </div>
          </div>

          <!-- BACK - FULL INFO -->
          <div class="flip-card-back p-6">
            <button onclick="toggleFlip(${index})" 
                    class="absolute top-5 right-5 bg-zinc-800 hover:bg-zinc-700 px-6 py-2.5 rounded-2xl text-sm z-20">
              ← Назад к уровню
            </button>

            <div id="full-info-${index}" class="pt-14">
              <p class="text-center text-zinc-500">Загрузка подробной информации...</p>
            </div>
          </div>

        </div>
      </div>`;

    container.innerHTML += cardHTML;
  });
}

function toggleFlip(index) {
  const card = document.getElementById(`card-${index}`);
  const flipped = card.classList.toggle('flipped');

  if (flipped) {
    const uid = accounts[index].uid;
    const infoDiv = document.getElementById(`full-info-${index}`);
    if (infoDiv.innerHTML.includes('Загрузка')) {
      getFullInfo(uid).then(data => {
        if (data) {
          infoDiv.innerHTML = formatFullProfile(uid, data);
        } else {
          infoDiv.innerHTML = `<p class="text-red-400 text-center">Не удалось загрузить данные</p>`;
        }
      });
    }
  }
}

// updateAccount, addNewAccount, deleteAccount, refreshAll — оставляем как в предыдущей версии
async function updateAccount(index) {
  const acc = accounts[index];
  try {
    const res = await fetch(`https://gojoinfoapi-mu.vercel.app/get?uid=${acc.uid}&region=RU`);
    const raw = await res.json();
    const captain = raw.captainBasicInfo || {};
    const accInfo = raw.AccountInfo || {};

    const totalExp = parseInt(captain.exp || accInfo.AccountEXP) || 0;
    const nickname = captain.nickname || accInfo.AccountName || acc.nickname;
    const likes = parseInt(accInfo.AccountLikes || 0);

    const now = Date.now();
    if ((now - acc.sessionStart) / 3600000 >= 24) {
      acc.sessionStart = now;
      acc.sessionStartExp = totalExp;
      acc.todayExp = 0;
    } else {
      acc.todayExp = Math.max(0, totalExp - (acc.sessionStartExp || totalExp));
    }

    acc.lastExp = totalExp;
    acc.nickname = nickname;
    acc.likes = likes;
    Object.assign(acc, calculateProgress(totalExp));

    saveAccounts();
    renderMainAccounts();
  } catch(e) { console.error(e); }
}

async function addNewAccount() {
  const uid = document.getElementById('uidInput').value.trim();
  if (!uid || accounts.some(a => a.uid === uid)) return alert("Неверный или существующий UID!");

  const now = Date.now();
  const newAcc = { uid, nickname:"Загрузка...", lastExp:0, todayExp:0, sessionStart:now, sessionStartExp:0, likes:0, level:1, progress:0, currentInLevel:0, remaining:48, needForNext:48 };
  accounts.push(newAcc);
  saveAccounts();
  renderMainAccounts();

  try {
    const res = await fetch(`https://gojoinfoapi-mu.vercel.app/get?uid=${uid}&region=RU`);
    const raw = await res.json();
    const totalExp = parseInt(raw.captainBasicInfo?.exp || raw.AccountInfo?.AccountEXP) || 0;
    const nickname = raw.captainBasicInfo?.nickname || raw.AccountInfo?.AccountName || "Unknown";

    Object.assign(newAcc, calculateProgress(totalExp));
    newAcc.lastExp = totalExp;
    newAcc.sessionStartExp = totalExp;
    newAcc.todayExp = 0;
    newAcc.nickname = nickname;
    newAcc.likes = parseInt(raw.AccountInfo?.AccountLikes || 0);

    saveAccounts();
    renderMainAccounts();
  } catch(e) {
    newAcc.nickname = "Ошибка";
    renderMainAccounts();
  }
}

function deleteAccount(index) {
  if (confirm("Удалить этот аккаунт?")) {
    accounts.splice(index, 1);
    saveAccounts();
    renderMainAccounts();
  }
}

function refreshAll() {
  accounts.forEach((_, i) => updateAccount(i));
}

// Запуск
loadAccounts();
refreshAll();
setInterval(refreshAll, 30000);
</script>
</body>
</html>
