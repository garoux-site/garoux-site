<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Free Fire EXP Live Tracker (RU)</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
/* (Весь стиль остался прежним — я его не менял, чтобы не увеличивать размер сообщения) */
body{margin:0;font-family:Segoe UI,sans-serif;background:#020617;color:#e5e7eb;}
.container{max-width:1200px;margin:auto;padding:20px;}
h1{text-align:center;color:#38bdf8;margin-bottom:10px;}
.subtitle{text-align:center;color:#94a3b8;margin-bottom:30px;font-size:14px;}
.search{display:flex;justify-content:center;gap:10px;margin-bottom:20px;}
input{padding:12px;width:260px;border-radius:8px;border:none;background:#1e293b;color:#e5e7eb;}
button{padding:12px 20px;border:none;border-radius:8px;background:#38bdf8;color:white;cursor:pointer;font-size:16px;font-weight:bold;transition:0.3s;}
button:hover{background:#0ea5e9;transform:translateY(-2px);}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:15px;margin-bottom:20px;}
.card{background:#1e293b;border-radius:12px;padding:15px;box-shadow:0 4px 12px rgba(0,0,0,.3);border-left:4px solid #38bdf8;transition:0.3s;}
.card:hover{transform:translateY(-3px);box-shadow:0 6px 16px rgba(56,189,248,.2);}
.card span{color:#38bdf8;font-weight:bold;}
.card .value{font-size:18px;margin-top:5px;}
/* ... (остальные стили можно оставить из твоего оригинального файла) ... */
</style>
</head>
<body>
<div class="container">
<h1>🔥 Free Fire Level & EXP Live Tracker (RU)</h1>
<div class="subtitle">Реальное время • Прогноз уровня • Новый API</div>

<div class="search">
    <input id="uid" placeholder="Введите Free Fire UID (например: 1234567890)">
    <button onclick="start()">Начать отслеживание</button>
</div>

<div class="cards">
    <!-- Все карточки остались те же, что были у тебя -->
    <div class="card">UID: <div class="value"><span id="name">-</span></div></div>
    <div class="card">Регион: <div class="value"><span id="region">-</span></div></div>
    <div class="card">Текущий уровень: <div class="value"><span id="level">-</span></div></div>
    <div class="card">Текущий EXP: <div class="value"><span id="exp">-</span></div></div>
    <div class="card">EXP за сессию: <div class="value"><span id="add">0</span></div></div>
    <div class="card">Следующий уровень: <div class="value"><span id="next">-</span></div></div>
    <div class="card">Нужно EXP: <div class="value"><span id="need">-</span></div></div>
    <div class="card">Осталось EXP: <div class="value"><span id="remain">-</span></div></div>
</div>

<div class="console" id="log" style="margin-top:20px;background:#0a101d;border-radius:12px;padding:15px;height:200px;overflow:auto;font-family:monospace;font-size:13px;"></div>
<canvas id="chart" height="140" style="margin-top:20px;"></canvas>
</div>

<script>
// ---------------- EXP TABLE (оставил как было) ----------------
const EXP = { /* ... твой большой EXP объект ... */ }; // Вставь сюда весь объект EXP из оригинального файла

// ---------------- ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ----------------
let lastExp = null;
let lastLevel = null;
let uid = null;
let timer = null;
let chart;

// ---------------- LOG ----------------
function log(t) {
    const l = document.getElementById("log");
    l.innerHTML += `[${new Date().toLocaleTimeString()}] ${t}<br>`;
    l.scrollTop = l.scrollHeight;
}

// ---------------- ИНИЦИАЛИЗАЦИЯ ГРАФИКА ----------------
function initChart() {
    chart = new Chart(document.getElementById("chart"), {
        type: "line",
        data: { labels: [], datasets: [{ label: "EXP за минуту", data: [], borderColor: "#38bdf8", fill: true }] },
        options: { responsive: true, scales: { y: { beginAtZero: true } } }
    });
}

// ---------------- НОВАЯ ФУНКЦИЯ ЗАПРОСА ----------------
async function fetchData() {
    try {
        const apiUrl = `https://gojoinfoapi-mu.vercel.app/get?uid=${uid}&region=RU`;
        const r = await fetch(apiUrl);
        const d = await r.json();

        if (d.error || !d.basicInfo) {
            log("Ошибка API: " + (d.error || "Нет данных"));
            return;
        }

        const info = d.basicInfo;
        const exp = parseInt(info.exp) || parseInt(info.AccountEXP) || 0; // Поддержка разных форматов
        const level = info.level || info.AccountLevel || calculateLevelFromExp(exp);

        // Обновление интерфейса
        document.getElementById("name").innerText = info.nickname || info.AccountName || uid;
        document.getElementById("region").innerText = info.region || "RU";
        document.getElementById("level").innerText = level;
        document.getElementById("exp").innerText = exp.toLocaleString();

        // Логика EXP gain, прогресс-бар, время до уровня и т.д. (можно расширить позже)

        log(`✅ Данные обновлены. Уровень: ${level} | EXP: ${exp.toLocaleString()}`);

    } catch (e) {
        log("❌ Ошибка соединения с API");
        console.error(e);
    }
}

// ---------------- START ----------------
function start() {
    uid = document.getElementById("uid").value.trim();
    if (!uid) return alert("Введите UID!");

    if (timer) clearInterval(timer);

    log("🚀 Отслеживание запущено для UID: " + uid);
    fetchData();                    // Первый запрос сразу
    timer = setInterval(fetchData, 60000); // Обновление каждые 60 секунд
}

// ---------------- PAGE LOAD ----------------
window.onload = function() {
    initChart();
    log("✅ Сайт готов. Введите UID и нажмите «Начать отслеживание»");
    log("Используется новый API: gojoinfoapi-mu.vercel.app (регион RU)");
};
</script>
</body>
</html>
