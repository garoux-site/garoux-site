<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FFLevel.pro - Live Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body { background: #0a0a0a; color: #ddd; font-family: system-ui, sans-serif; }
    .card { background: #111; border-radius: 16px; }
    .progress-container { background: #1f1f1f; height: 12px; border-radius: 9999px; overflow: hidden; }
    .progress-bar { height: 100%; background: linear-gradient(90deg, #22c55e, #4ade80); transition: width 0.6s ease; }
    .live { animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
  </style>
</head>
<body class="min-h-screen pb-12">

<div class="max-w-2xl mx-auto pt-6 px-4">

  <!-- Header -->
  <div class="flex justify-between items-center mb-6">
    <div class="flex items-center gap-3">
      <div class="w-10 h-10 bg-gradient-to-br from-green-500 to-emerald-600 rounded-2xl flex items-center justify-center text-2xl">🔥</div>
      <h1 class="text-3xl font-bold tracking-tight">FFLEVEL.PRO</h1>
    </div>
    <button onclick="refreshData()" class="flex items-center gap-2 bg-zinc-800 hover:bg-zinc-700 px-5 py-2 rounded-2xl text-sm">
      <i class="fa-solid fa-rotate"></i> Refresh
    </button>
  </div>

  <!-- Search -->
  <div class="mb-8">
    <div class="relative">
      <input id="uidInput" type="text" placeholder="Введите UID (например: 15200904087 или 9900005554)" 
             class="w-full bg-zinc-900 border border-zinc-700 focus:border-green-500 rounded-3xl px-6 py-5 text-lg outline-none"
             onkeypress="if(event.key === 'Enter') startTracking()">
      <button onclick="startTracking()" 
              class="absolute right-2 top-1/2 -translate-y-1/2 bg-green-600 hover:bg-green-500 px-8 py-4 rounded-3xl font-semibold">
        Поиск
      </button>
    </div>
  </div>

  <!-- Result -->
  <div id="result" class="hidden card p-6 space-y-6">

    <!-- Player Header -->
    <div class="flex items-center gap-5">
      <img id="avatar" src="https://via.placeholder.com/100/1f2937/22c55e?text=FF" 
           class="w-20 h-20 rounded-2xl border-2 border-zinc-700 object-cover">
      <div class="flex-1">
        <div class="flex items-center gap-3">
          <h2 id="nickname" class="text-3xl font-bold">Loading...</h2>
          <span id="liveBadge" class="hidden bg-green-600 text-white text-xs px-4 py-1 rounded-full flex items-center gap-1.5">
            <span class="w-2 h-2 bg-white rounded-full live"></span> LIVE
          </span>
        </div>
        <p id="uidDisplay" class="text-green-400">UID: —</p>
        <p id="levelText" class="text-2xl text-emerald-400">Level —</p>
      </div>
    </div>

    <!-- Progress -->
    <div>
      <div class="flex justify-between text-sm mb-2">
        <span id="progressPercent" class="font-bold text-green-400">0.00% Progress</span>
        <span id="expInfo" class="text-zinc-400">0 / 0 EXP</span>
      </div>
      <div class="progress-container">
        <div id="progressBar" class="progress-bar" style="width: 0%"></div>
      </div>
      <div class="flex justify-between text-xs mt-3 text-zinc-500">
        <div><i class="fa-solid fa-bolt"></i> <span id="xpPerMin">0</span> XP/min</div>
        <div id="eta">ETA —</div>
      </div>
    </div>

    <!-- EXP Stats -->
    <div class="grid grid-cols-2 gap-4">
      <div class="bg-zinc-900 rounded-3xl p-5">
        <p class="text-xs text-zinc-500">Current EXP</p>
        <p id="currentExp" class="text-4xl font-bold">0</p>
      </div>
      <div class="bg-zinc-900 rounded-3xl p-5">
        <p class="text-xs text-zinc-500">Remaining XP</p>
        <p id="remainingExp" class="text-4xl font-bold text-orange-400">0</p>
      </div>
    </div>

    <!-- Token & Today -->
    <div class="bg-zinc-900 rounded-3xl p-5 text-sm">
      <div class="flex justify-between items-center">
        <div>
          <span class="text-green-400">Token Expires:</span> 
          <span id="tokenTime">7h 59m (at 07:28)</span>
        </div>
        <span class="bg-green-600 px-5 py-1 rounded-full text-xs font-bold">SUCCESS</span>
      </div>
    </div>

    <div class="bg-zinc-900 rounded-3xl p-5">
      <p id="totalToday" class="text-green-400 font-medium">Total +0 EXP today</p>
      <p class="text-sm text-zinc-500">Level — → —</p>
    </div>

    <!-- Buttons -->
    <div class="flex gap-3 pt-4">
      <button class="flex-1 bg-zinc-800 hover:bg-zinc-700 py-4 rounded-2xl flex items-center justify-center gap-2">
        <i class="fa-solid fa-bell"></i> Notify
      </button>
      <button onclick="togglePause()" id="pauseBtn"
              class="flex-1 bg-zinc-800 hover:bg-zinc-700 py-4 rounded-2xl flex items-center justify-center gap-2">
        <i class="fa-solid fa-pause"></i> Pause
      </button>
      <button class="flex-1 bg-red-600 hover:bg-red-500 py-4 rounded-2xl flex items-center justify-center gap-2">
        <i class="fa-solid fa-trash"></i> Delete
      </button>
    </div>
  </div>

  <!-- Placeholder -->
  <div id="placeholder" class="card p-12 text-center text-zinc-500">
    <i class="fa-solid fa-magnifying-glass text-6xl mb-6 opacity-40"></i>
    <p class="text-xl">Введите UID Free Fire</p>
    <p class="text-sm mt-2">Пример: 15200904087 или 9900005554</p>
  </div>
</div>

<script>
// ==================== ПОЛНАЯ EXP ТАБЛИЦА ДО 100 УРОВНЯ ====================
const EXP_TABLE = {
  1: [0, 48],     2: [48, 154],    3: [202, 342],    4: [544, 468],    5: [1012, 832],
  6: [1844, 948], 7: [2792, 1008], 8: [3800, 1070], 9: [4870, 1134], 10: [6004, 1188],
  11: [7192, 1256], 12: [8448, 1328], 13: [9776, 1364], 14: [11140, 1426], 15: [12566, 1494],
  16: [14060, 1550], 17: [15610, 1614], 18: [17224, 1678], 19: [18902, 1730], 20: [20632, 1792],
  21: [22424, 2304], 22: [24728, 1464], 23: [26192, 1974], 24: [28166, 2034], 25: [30200, 2094],
  26: [32294, 2154], 27: [34448, 3356], 28: [37804, 3370], 29: [41174, 3696], 30: [44870, 3982],
  31: [48852, 4482], 32: [53334, 5232], 33: [58566, 5530], 34: [64096, 5898], 35: [69994, 6466],
  36: [76460, 6648], 37: [83108, 8020], 38: [91128, 8194], 39: [99322, 8770], 40: [108092, 12052],
  41: [120144, 13122], 42: [133266, 14206], 43: [147472, 15288], 44: [162760, 16366], 45: [179126, 17446],
  46: [196572, 18796], 47: [215368, 20148], 48: [235516, 21494], 49: [257010, 22850], 50: [279860, 24196],
  51: [304056, 44262], 52: [348318, 46664], 53: [394982, 49062], 54: [444044, 51464], 55: [495508, 53856],
  56: [549364, 84392], 57: [633756, 87988], 58: [721744, 91592], 59: [813336, 95186], 60: [908522, 132916],
  61: [1041438, 138914], 62: [1180352, 144904], 63: [1325256, 150928], 64: [1476184, 158116], 65: [1634300, 206646],
  66: [1840946, 215648], 67: [2056594, 224648], 68: [2281242, 233638], 69: [2514880, 242650], 70: [2757530, 301976],
  71: [3059506, 312778], 72: [3372284, 327172], 73: [3699456, 341574], 74: [4041030, 355990], 75: [4397020, 432084],
  76: [4829104, 453100], 77: [5282204, 474100], 78: [5756304, 495100], 79: [6251404, 516100], 80: [6767504, 613820],
  81: [7381324, 661830], 82: [8043154, 709798], 83: [8752952, 757856], 84: [9510808, 804830], 85: [10316638, 960552],
  86: [11277190, 1083558], 87: [12360748, 999556], 88: [13360304, 1122554], 89: [14482858, 1170560], 90: [15659418, 1367290],
  91: [17026708, 1426980], 92: [18453688, 1488592], 93: [19941280, 1546280], 94: [21488570, 1606288], 95: [23095858, 1665280],
  96: [24763138, 1722000], 97: [26490138, 1787570], 98: [28277708, 1847288], 99: [30124996, 1907288], 100: [32032284, 0]
};

let currentUid = null;
let isPaused = false;

async function fetchPlayerData(uid) {
  const resultDiv = document.getElementById('result');
  const placeholder = document.getElementById('placeholder');

  resultDiv.classList.remove('hidden');
  placeholder.classList.add('hidden');

  document.getElementById('nickname').textContent = 'Загрузка...';

  try {
    const res = await fetch(`https://gojoinfoapi-mu.vercel.app/get?uid=${uid}&region=RU`);
    if (!res.ok) throw new Error('Network error');

    const data = await res.json();

    const nickname = data.nickname || data.name || "Unknown Player";
    let totalExp = parseInt(data.exp) || parseInt(data.AccountEXP) || 0;
    let level = parseInt(data.level) || 1;

    // Расчёт уровня и remaining XP по полной таблице
    let baseExp = 0;
    let needForNext = 0;
    let calculatedLevel = 1;

    for (let lvl = 1; lvl <= 100; lvl++) {
      if (EXP_TABLE[lvl]) {
        if (totalExp >= EXP_TABLE[lvl][0]) {
          calculatedLevel = lvl;
          baseExp = EXP_TABLE[lvl][0];
          needForNext = EXP_TABLE[lvl][1] || 0;
        } else {
          break;
        }
      }
    }

    level = calculatedLevel;
    const currentInLevel = totalExp - baseExp;
    const remaining = Math.max(0, needForNext - currentInLevel);
    const progress = needForNext > 0 ? Math.min(100, (currentInLevel / needForNext) * 100) : 100;

    // Обновление интерфейса
    document.getElementById('nickname').textContent = nickname;
    document.getElementById('uidDisplay').textContent = `UID: ${uid}`;
    document.getElementById('levelText').textContent = `Level ${level}`;
    document.getElementById('currentExp').textContent = totalExp.toLocaleString('ru-RU');
    document.getElementById('remainingExp').textContent = remaining.toLocaleString('ru-RU');
    document.getElementById('progressPercent').textContent = `${progress.toFixed(2)}% Progress`;
    document.getElementById('expInfo').textContent = `${currentInLevel.toLocaleString('ru-RU')} / ${needForNext.toLocaleString('ru-RU')} EXP`;
    document.getElementById('progressBar').style.width = `${progress}%`;

    document.getElementById('liveBadge').classList.remove('hidden');
    document.getElementById('totalToday').textContent = `Total +0 EXP today`;

  } catch (err) {
    console.error(err);
    document.getElementById('nickname').textContent = 'Ошибка загрузки';
    document.getElementById('levelText').textContent = 'Проверьте UID';
  }
}

function startTracking() {
  currentUid = document.getElementById('uidInput').value.trim();
  if (!currentUid) {
    alert("Введите UID игрока!");
    return;
  }
  fetchPlayerData(currentUid);
}

function refreshData() {
  if (currentUid) {
    fetchPlayerData(currentUid);
  }
}

function togglePause() {
  isPaused = !isPaused;
  const btn = document.getElementById('pauseBtn');
  btn.innerHTML = isPaused 
    ? `<i class="fa-solid fa-play"></i> Resume` 
    : `<i class="fa-solid fa-pause"></i> Pause`;
}

// Автообновление каждые 12 секунд
setInterval(() => {
  if (currentUid && !isPaused) refreshData();
}, 12000);

</script>
</body>
</html>
