<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GAROUX MODZ - Free Fire Info</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        body {
            margin:0; padding:0; background:#111113; color:#e0e0e0; 
            font-family:'Inter',sans-serif; line-height:1.5;
        }
        header {
            background:#1a1a1c; padding:20px; text-align:center; border-bottom:1px solid #333;
        }
        .logo { font-size:2.2em; font-weight:600; color:#fff; }
        .subtitle { font-size:0.9em; color:#888; }

        .main-grid {
            display:grid; grid-template-columns:repeat(auto-fit,minmax(320px,1fr)); gap:20px; 
            padding:30px 20px; max-width:1200px; margin:auto;
        }
        .card {
            background:#1f1f21; border:1px solid #333; border-radius:12px; padding:20px; 
            text-align:center; cursor:pointer; transition:0.2s;
        }
        .card:hover { background:#27272a; border-color:#555; }
        .avatar { width:90px; height:90px; border-radius:50%; border:3px solid #444; margin:auto; }

        .modal {
            display:none; position:fixed; top:0; left:0; width:100%; height:100%; 
            background:rgba(0,0,0,0.85); z-index:999; align-items:center; justify-content:center;
        }
        .modal-content {
            background:#1a1a1c; width:95%; max-width:820px; border-radius:16px; 
            padding:25px; border:1px solid #333;
        }
        input, select, button {
            width:100%; padding:14px; background:#27272a; border:1px solid #444; 
            border-radius:8px; color:#e0e0e0; font-size:1em; margin-bottom:15px;
        }
        button {
            background:#d4a017; color:#111; font-weight:600; border:none; cursor:pointer;
        }
        button:hover { background:#e0b030; }
        .profile-header {
            background:#2a2a2e; padding:20px; border-radius:12px; display:flex; gap:20px; align-items:center;
        }
        .profile-header img { width:120px; height:120px; border-radius:12px; border:4px solid #444; }
        .before-after {
            display:flex; justify-content:space-between; margin:20px 0; font-size:1.1em;
        }
        .before { color:#888; }
        .after { color:#00cc66; font-weight:600; }
        table { width:100%; border-collapse:collapse; margin-top:20px; }
        td { padding:12px; border-bottom:1px solid #333; }
    </style>
</head>
<body>
    <header>
        <div class="logo">GAROUX MODZ</div>
        <div class="subtitle">Free Fire Info & Likes • Beta</div>
    </header>

    <div style="text-align:center;padding:15px;">
        <input id="newUid" placeholder="Введи новый UID" style="width:250px;">
        <button onclick="addAccount()">Добавить аккаунт</button>
    </div>

    <div class="main-grid" id="accountsGrid"></div>

    <!-- МОДАЛЬНОЕ ОКНО -->
    <div class="modal" id="modal">
        <div class="modal-content">
            <button onclick="closeModal()" style="float:right;background:none;border:none;font-size:1.8em;color:#888;">✕</button>
            <h2 id="modalNickname" style="text-align:center;margin:0 0 20px;"></h2>

            <!-- ПРОФИЛЬ КАК НА СКРИНЕ -->
            <div class="profile-header" id="profileHeader"></div>

            <!-- БЛОК BOOST LIKES -->
            <div style="margin:25px 0;">
                <h3 style="margin-bottom:15px;">Boost Your Likes</h3>
                <input id="coupon" placeholder="COUPON CODE (пример: LIKES-GAROUX-XXXX)" value="LIKES-GAROUX-TPVL-19TN">
                <div style="display:flex;gap:15px;">
                    <div style="flex:1;">
                        <label style="font-size:0.85em;color:#888;">REGION</label>
                        <select id="region"><option>India</option><option>Russia</option><option>Global</option></select>
                    </div>
                    <div style="flex:1;">
                        <label style="font-size:0.85em;color:#888;">LIKES AMOUNT</label>
                        <input id="likesAmount" type="number" value="10">
                    </div>
                </div>
                <button onclick="fakeBoost()" style="margin-top:15px;">Send Likes →</button>
            </div>

            <!-- BEFORE / AFTER -->
            <div class="before-after" id="beforeAfter">
                <div class="before">BEFORE<br><span id="beforeLikes">13.059</span></div>
                <div class="after">AFTER<br><span id="afterLikes">13.069</span> +10</div>
            </div>

            <!-- ТАБЛИЦА ЗА СЕГОДНЯ -->
            <table id="statsTable">
                <!-- заполняется JS -->
            </table>
        </div>
    </div>

    <script>
        const API = "https://flash-player-info.vercel.app/info?uid=";
        const KEY = "&key=Flash";
        let accounts = [
            {uid: "7478766823"},
            {uid: "ВАШ_UID_2"},
            {uid: "ВАШ_UID_3"},
            {uid: "ВАШ_UID_4"}
        ];
        let currentData = {};

        async function updateAll() {
            const grid = document.getElementById("accountsGrid");
            grid.innerHTML = "";
            for (let acc of accounts) {
                const res = await fetch(API + acc.uid + KEY).then(r => r.json()).catch(()=>null);
                if (!res?.basicInfo) continue;
                currentData[acc.uid] = res;
                const info = res.basicInfo;

                const card = document.createElement("div");
                card.className = "card";
                card.innerHTML = `
                    <img src="https://picsum.photos/id/1015/300" class="avatar">
                    <h3>${info.nickname}</h3>
                    <p>UID: ${acc.uid}<br>Уровень: ${info.level} | Лайки: ${info.liked}</p>
                `;
                card.onclick = () => openProfile(acc.uid);
                grid.appendChild(card);
            }
        }

        function openProfile(uid) {
            const data = currentData[uid];
            if (!data) return;
            const info = data.basicInfo;

            document.getElementById("modalNickname").textContent = info.nickname;
            document.getElementById("profileHeader").innerHTML = `
                <img src="https://picsum.photos/id/1015/300">
                <div>
                    <h3>${info.nickname}</h3>
                    <p>UID: ${uid}</p>
                    <p>Lv.${info.level}</p>
                </div>
            `;

            // before/after
            document.getElementById("beforeLikes").textContent = info.liked;
            document.getElementById("afterLikes").textContent = info.liked;

            // таблица
            const table = document.getElementById("statsTable");
            table.innerHTML = `
                <tr><td>Лайки</td><td>+0</td><td>${info.liked}</td></tr>
                <tr><td>XP</td><td>+0</td><td>${info.exp || 0}</td></tr>
                <tr><td>Рейтинг</td><td>+0</td><td>${info.rankingPoints || 0}</td></tr>
            `;

            document.getElementById("modal").style.display = "flex";
        }

        function fakeBoost() {
            const amount = parseInt(document.getElementById("likesAmount").value) || 10;
            const before = parseInt(document.getElementById("beforeLikes").textContent);
            document.getElementById("afterLikes").textContent = before + amount;
            document.getElementById("afterLikes").parentElement.innerHTML = `AFTER<br><span style="color:#00cc66;">\( {before + amount}</span> + \){amount}`;
            alert(`✅ +${amount} лайков отправлено! (фейк для демо)`);
        }

        function closeModal() {
            document.getElementById("modal").style.display = "none";
        }

        function addAccount() {
            const uid = document.getElementById("newUid").value.trim();
            if (uid) { accounts[3] = {uid}; updateAll(); }
        }

        setInterval(updateAll, 15000);
        window.onload = updateAll;
    </script>
</body>
</html>
