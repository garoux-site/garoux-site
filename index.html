<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FFGarouX</title>

  <!-- Firebase SDK (актуальная версия на 2026 год — modular API) -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
    // или более новая, если хочешь: 12.3.0 / 12.9.0 (проверь https://firebase.google.com/support/release-notes/js)
    // import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";

    import {
      getFirestore,
      collection,
      addDoc,
      getDocs,
      query,
      orderBy
    } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js";
    // соответственно: "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js"

    const firebaseConfig = {
      apiKey: "AIzaSyCBZQzVUcx7-A5y7hgCvGjwhu4mfAWVEIE",
      authDomain: "ffgaroux-a58e7.firebaseapp.com",
      projectId: "ffgaroux-a58e7",
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Делаем db доступным глобально (для функций ниже)
    window.db = db;
  </script>

  <style>
    :root {
      --bg: #05050d;
      --card: #0e1022;
      --accent: #ff9f0a;
      --accent2: #ff3c3c;
      --text: #fff;
      --muted: #9aa0d1
    }
    * { box-sizing: border-box }
    body {
      margin: 0;
      font-family: Inter, Arial;
      background: linear-gradient(180deg, #05050d, #0b0d1a);
      color: var(--text)
    }
    .hidden { display: none }

    header {
      position: fixed;
      top: 0; left: 0; right: 0;
      display: flex; align-items: center; gap: 10px;
      padding: 12px 16px;
      background: rgba(5,5,13,.9);
      backdrop-filter: blur(10px);
      z-index: 10
    }
    header img { width: 38px; height: 38px; border-radius: 50% }
    header h1 {
      font-size: 18px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent
    }

    section { padding: 90px 16px 40px; max-width: 1100px; margin: auto }
    .hero {
      padding: 34px;
      border-radius: 26px;
      background: radial-gradient(circle at top, rgba(255,60,60,.25), transparent 60%)
    }
    .hero h2 { font-size: 28px }
    .hero p { color: var(--muted); line-height: 1.7 }

    .btn {
      display: inline-block;
      margin-top: 16px;
      padding: 14px 24px;
      border-radius: 16px;
      font-weight: 700;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      color: #fff;
      text-decoration: none;
      box-shadow: 0 0 25px rgba(255,60,60,.45)
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 14px;
      margin: 26px 0
    }
    .card { background: var(--card); padding: 20px; border-radius: 22px }
    .card h3 { margin: 0 0 6px }
    .list p { margin: 8px 0; color: var(--muted) }

    .bottom-nav {
      position: fixed;
      bottom: 18px; left: 50%; transform: translateX(-50%);
      background: #0e1022;
      border-radius: 26px;
      display: flex; gap: 6px;
      padding: 6px;
      box-shadow: 0 10px 40px rgba(0,0,0,.7)
    }
    .bottom-nav button {
      background: none;
      border: none;
      color: #cfd3ff;
      padding: 14px 18px;
      border-radius: 18px;
      font-weight: 600
    }
    .bottom-nav button.active {
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      color: #fff
    }

    .auth {
      max-width: 420px;
      margin: 120px auto;
      background: var(--card);
      padding: 24px;
      border-radius: 26px
    }
    input, textarea, select {
      width: 100%;
      margin: 8px 0;
      padding: 12px;
      border-radius: 14px;
      border: none
    }
    .review {
      background: #1a1c33;
      padding: 14px;
      border-radius: 14px;
      margin-bottom: 10px
    }
    small { color: #8c92c9 }
  </style>
</head>
<body>

  <header>
    <img src="bg.jpg" alt="">
    <h1>FFGarouX</h1>
  </header>

  <!-- AUTH -->
  <div class="auth" id="auth">
    <h2>Вход / Регистрация</h2>
    <input id="nick" placeholder="Ник">
    <input id="pass" type="password" placeholder="Пароль">
    <button class="btn" onclick="register()">Регистрация</button>
    <button class="btn" onclick="login()">Войти</button>
    <p id="authMsg"></p>
  </div>

  <!-- GUILD -->
  <section id="guild" class="hidden">
    <!-- ... весь твой контент гильдии без изменений ... -->
    <div class="hero">
      <h2>Доминируйте в славе клана автоматически</h2>
      <p>Самая продвинутая система автоматизации клановой славы Free Fire. Поднимите рейтинг клана, пока спите, с помощью нашей интеллектуальной технологии ботов.</p>
      <a class="btn" href="https://t.me/garoux24" target="_blank">Начните сейчас</a>
    </div>
    <!-- остальной код секции guild оставляем как был -->
  </section>

  <!-- DRIP, REVIEWS, SETTINGS — оставляем как есть -->

  <!-- REVIEWS -->
  <section id="reviews" class="hidden">
    <h2>Отзывы</h2>
    <textarea id="reviewText" placeholder="Ваш отзыв..."></textarea>
    <button class="btn" onclick="sendReview()">Отправить</button>
    <div id="reviewsList"></div>
  </section>

  <!-- bottom nav -->
  <div class="bottom-nav" id="nav" style="display:none">
    <button class="active" onclick="openTab('guild')">Гильдия</button>
    <button onclick="openTab('drip')">Drip</button>
    <button onclick="openTab('reviews')">Отзывы</button>
    <button onclick="openTab('settings')">⚙</button>
  </div>

  <script>
    let currentUser = null;

    const auth = document.getElementById('auth');
    const authMsg = document.getElementById('authMsg');
    const nickInput = document.getElementById('nick');
    const passInput = document.getElementById('pass');

    async function register() {
      const nick = nickInput.value.trim();
      const pass = passInput.value.trim();
      if (!nick || !pass) {
        authMsg.textContent = 'Введите ник и пароль';
        return;
      }

      try {
        const snapshot = await getDocs(collection(window.db, 'users'));
        let exists = false;
        snapshot.forEach(doc => {
          if (doc.data().nick === nick) exists = true;
        });

        if (exists) {
          authMsg.textContent = 'Такой ник уже существует';
          return;
        }

        await addDoc(collection(window.db, 'users'), {
          nick: nick,
          pass: pass
        });

        authMsg.textContent = 'Регистрация успешна. Теперь войдите.';
      } catch (e) {
        authMsg.textContent = 'Ошибка: ' + e.message;
      }
    }

    async function login() {
      const nick = nickInput.value.trim();
      const pass = passInput.value.trim();
      if (!nick || !pass) {
        authMsg.textContent = 'Введите ник и пароль';
        return;
      }

      try {
        const snapshot = await getDocs(collection(window.db, 'users'));
        let ok = false;
        snapshot.forEach(doc => {
          const data = doc.data();
          if (data.nick === nick && data.pass === pass) {
            ok = true;
            currentUser = nick;
          }
        });

        if (!ok) {
          authMsg.textContent = 'Неверный логин или пароль';
          return;
        }

        auth.classList.add('hidden');
        document.getElementById('guild').classList.remove('hidden');
        document.getElementById('nav').style.display = 'flex';
        loadReviews();
      } catch (e) {
        authMsg.textContent = 'Ошибка: ' + e.message;
      }
    }

    async function sendReview() {
      if (!currentUser) {
        alert('Сначала войдите');
        return;
      }
      const text = document.getElementById('reviewText').value.trim();
      if (!text) return;

      try {
        await addDoc(collection(window.db, 'reviews'), {
          user: currentUser,
          text: text,
          time: Date.now()
        });
        document.getElementById('reviewText').value = '';
        loadReviews();
      } catch (e) {
        alert('Ошибка отправки: ' + e.message);
      }
    }

    async function loadReviews() {
      const list = document.getElementById('reviewsList');
      list.innerHTML = '';

      try {
        const q = query(collection(window.db, 'reviews'), orderBy('time', 'desc'));
        const snapshot = await getDocs(q);

        snapshot.forEach(doc => {
          const data = doc.data();
          const div = document.createElement('div');
          div.className = 'review';
          div.innerHTML = `
            <b>${data.user}</b><br>
            ${data.text}<br>
            <small>${new Date(data.time).toLocaleString()}</small>
          `;
          list.appendChild(div);
        });
      } catch (e) {
        console.error('Ошибка загрузки отзывов:', e);
      }
    }

    function logout() {
      currentUser = null;
      location.reload();
    }

    function openTab(tabId) {
      ['guild', 'drip', 'reviews', 'settings'].forEach(id => {
        document.getElementById(id).classList.add('hidden');
      });
      document.getElementById(tabId).classList.remove('hidden');

      document.querySelectorAll('.bottom-nav button').forEach(btn => {
        btn.classList.remove('active');
      });
      event.target.classList.add('active');
    }
  </script>
</body>
</html>
