<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FFGarouX</title>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
    import {
      getFirestore,
      collection,
      addDoc,
      getDocs,
      query,
      orderBy
    } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCBZQzVUcx7-A5y7hgCvGjwhu4mfAWVEIE",
      authDomain: "ffgaroux-a58e7.firebaseapp.com",
      projectId: "ffgaroux-a58e7",
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let currentUser = null;

    // ──────────────────────────────────────────────
    // Функции, доступные для onclick
    // ──────────────────────────────────────────────

    window.register = async function () {
      const nick = document.getElementById('nick').value.trim();
      const pass = document.getElementById('pass').value.trim();
      const msg = document.getElementById('authMsg');

      if (!nick || !pass) {
        msg.textContent = 'Введите ник и пароль';
        return;
      }

      try {
        const snapshot = await getDocs(collection(db, 'users'));
        let exists = false;
        snapshot.forEach(doc => {
          if (doc.data().nick === nick) exists = true;
        });

        if (exists) {
          msg.textContent = 'Такой ник уже существует';
          return;
        }

        await addDoc(collection(db, 'users'), { nick, pass });
        msg.textContent = 'Регистрация успешна. Теперь войдите.';
      } catch (e) {
        msg.textContent = 'Ошибка: ' + e.message;
        console.error(e);
      }
    };

    window.login = async function () {
      const nick = document.getElementById('nick').value.trim();
      const pass = document.getElementById('pass').value.trim();
      const msg = document.getElementById('authMsg');

      if (!nick || !pass) {
        msg.textContent = 'Введите ник и пароль';
        return;
      }

      try {
        const snapshot = await getDocs(collection(db, 'users'));
        let ok = false;
        snapshot.forEach(doc => {
          const data = doc.data();
          if (data.nick === nick && data.pass === pass) {
            ok = true;
            currentUser = nick;
          }
        });

        if (!ok) {
          msg.textContent = 'Неверный логин или пароль';
          return;
        }

        document.getElementById('auth').classList.add('hidden');
        document.getElementById('guild').classList.remove('hidden');
        document.getElementById('nav').style.display = 'flex';
        loadReviews();
      } catch (e) {
        msg.textContent = 'Ошибка: ' + e.message;
        console.error(e);
      }
    };

    window.sendReview = async function () {
      if (!currentUser) {
        alert('Сначала войдите');
        return;
      }

      const text = document.getElementById('reviewText').value.trim();
      if (!text) return;

      try {
        await addDoc(collection(db, 'reviews'), {
          user: currentUser,
          text,
          time: Date.now()
        });
        document.getElementById('reviewText').value = '';
        loadReviews();
      } catch (e) {
        alert('Ошибка отправки: ' + e.message);
      }
    };

    window.loadReviews = async function () {
      const list = document.getElementById('reviewsList');
      if (!list) return;
      list.innerHTML = '';

      try {
        const q = query(collection(db, 'reviews'), orderBy('time', 'desc'));
        const snapshot = await getDocs(q);

        snapshot.forEach(doc => {
          const data = doc.data();
          const div = document.createElement('div');
          div.className = 'review';
          div.innerHTML = `
            <b>${data.user || 'Аноним'}</b><br>
            ${data.text}<br>
            <small>${new Date(data.time).toLocaleString('ru-RU')}</small>
          `;
          list.appendChild(div);
        });
      } catch (e) {
        console.error('Ошибка загрузки отзывов:', e);
      }
    };

    window.openTab = function (tabId) {
      ['guild', 'drip', 'reviews', 'settings'].forEach(id => {
        document.getElementById(id).classList.add('hidden');
      });
      document.getElementById(tabId).classList.remove('hidden');

      document.querySelectorAll('.bottom-nav button').forEach(btn => {
        btn.classList.remove('active');
      });
      event.target.classList.add('active');
    };

    window.logout = function () {
      currentUser = null;
      location.reload();
    };

    // Загружаем отзывы при старте, если уже авторизован (на случай перезагрузки)
    // Но в твоём случае лучше после логина
  </script>

  <style>
    :root {
      --bg: #05050d;
      --card: #0e1022;
      --accent: #ff9f0a;
      --accent2: #ff3c3c;
      --text: #fff;
      --muted: #9aa0d1;
    }
    * { box-sizing: border-box; margin:0; padding:0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: linear-gradient(180deg, #05050d, #0b0d1a);
      color: var(--text);
      min-height: 100vh;
    }
    .hidden { display: none !important; }

    header {
      position: fixed;
      top: 0; left: 0; right: 0;
      display: flex; align-items: center; gap: 12px;
      padding: 12px 16px;
      background: rgba(5,5,13,0.92);
      backdrop-filter: blur(10px);
      z-index: 100;
    }
    header img { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }

    header h1 {
      font-size: 1.1rem;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    section { padding: 90px 16px 80px; max-width: 1100px; margin: 0 auto; }
    .hero {
      padding: 32px;
      border-radius: 24px;
      background: radial-gradient(circle at top, rgba(255,60,60,0.2), transparent 70%);
      margin-bottom: 24px;
    }

    .btn {
      display: inline-block;
      padding: 14px 28px;
      border-radius: 16px;
      font-weight: 700;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      color: white;
      text-decoration: none;
      border: none;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(255,60,60,0.3);
    }

    .auth {
      max-width: 420px;
      margin: 140px auto 40px;
      background: var(--card);
      padding: 32px 24px;
      border-radius: 24px;
      text-align: center;
    }
    input, textarea {
      width: 100%;
      padding: 14px;
      margin: 12px 0;
      border-radius: 14px;
      border: none;
      background: #1a1c33;
      color: white;
      font-size: 1rem;
    }
    .review {
      background: #1a1c33;
      padding: 16px;
      border-radius: 16px;
      margin: 12px 0;
      line-height: 1.5;
    }

    .bottom-nav {
      position: fixed;
      bottom: 16px; left: 50%; transform: translateX(-50%);
      background: #0e1022;
      border-radius: 999px;
      display: flex;
      gap: 6px;
      padding: 8px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.6);
      z-index: 100;
    }
    .bottom-nav button {
      background: none;
      border: none;
      color: #c0c4ff;
      padding: 12px 20px;
      border-radius: 999px;
      font-weight: 600;
      cursor: pointer;
    }
    .bottom-nav button.active {
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      color: white;
    }

    small { color: #8c92c9; font-size: 0.85rem; }
  </style>
</head>
<body>

  <header>
    <img src="bg.jpg" alt="logo">
    <h1>FFGarouX</h1>
  </header>

  <!-- Авторизация -->
  <div class="auth" id="auth">
    <h2>Вход / Регистрация</h2>
    <input id="nick" placeholder="Ник" autocomplete="off">
    <input id="pass" type="password" placeholder="Пароль" autocomplete="off">
    <div style="display:flex; gap:12px; margin-top:20px;">
      <button class="btn" onclick="register()">Регистрация</button>
      <button class="btn" onclick="login()">Войти</button>
    </div>
    <p id="authMsg" style="margin-top:16px; min-height:1.4em;"></p>
  </div>

  <!-- Гильдия (Guild) -->
  <section id="guild" class="hidden">
    <div class="hero">
      <h2>Доминируйте в славе клана автоматически</h2>
      <p>Самая продвинутая система автоматизации клановой славы Free Fire.</p>
      <a class="btn" href="https://t.me/garoux24" target="_blank">Начните сейчас</a>
    </div>
    <!-- Добавь сюда свой контент: карточки, цены и т.д. -->
  </section>

  <!-- Drip -->
  <section id="drip" class="hidden">
    <div class="hero">
      <h2>DRIP CLIENT 🌟</h2>
      <p>Читы без бана • Android • БЕЗ БАНА</p>
      <a class="btn" href="https://t.me/garoux24">Купить ключ</a>
    </div>
    <!-- Добавь список фич и цены -->
  </section>

  <!-- Отзывы -->
  <section id="reviews" class="hidden">
    <h2>Отзывы</h2>
    <textarea id="reviewText" placeholder="Ваш отзыв..." rows="4"></textarea>
    <button class="btn" onclick="sendReview()" style="margin:12px 0;">Отправить</button>
    <div id="reviewsList"></div>
  </section>

  <!-- Настройки -->
  <section id="settings" class="hidden">
    <div style="background:var(--card); padding:24px; border-radius:24px;">
      <h2>Настройки</h2>
      <p>Telegram: @garoux24</p>
      <button class="btn" onclick="logout()" style="margin-top:20px;">Выйти</button>
    </div>
  </section>

  <!-- Нижняя навигация -->
  <div class="bottom-nav" id="nav" style="display:none;">
    <button class="active" onclick="openTab('guild')">Гильдия</button>
    <button onclick="openTab('drip')">Drip</button>
    <button onclick="openTab('reviews')">Отзывы</button>
    <button onclick="openTab('settings')">⚙</button>
  </div>

</body>
</html>
