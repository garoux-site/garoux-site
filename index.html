<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Управление ботом / сервером</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            padding: 20px;
            max-width: 600px;
            margin: 0 auto;
        }
        .container {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h1 { text-align: center; color: #333; }
        label { display: block; margin: 15px 0 5px; font-weight: bold; }
        input, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px;
        }
        button {
            margin: 10px 5px 10px 0;
            padding: 12px 20px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        .btn-start { background: #4CAF50; color: white; }
        .btn-stop  { background: #f44336; color: white; }
        .btn-status { background: #2196F3; color: white; }
        button:hover { opacity: 0.9; }
        #result {
            margin-top: 20px;
            padding: 15px;
            background: #f9f9f9;
            border: 1px solid #ddd;
            border-radius: 8px;
            min-height: 100px;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .status-ok { color: green; }
        .status-error { color: red; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔧 Панель управления</h1>

        <label>Base URL (меняется каждый раз):</label>
        <input type="text" id="baseUrl" value="http://100.98.84.48:5000" placeholder="http://100.98.84.48:5000">

        <label>User ID:</label>
        <input type="text" id="userId" placeholder="123456789" value="123456789">

        <label>Duration (время):</label>
        <input type="number" id="duration" value="4" min="1">

        <div style="margin-top: 20px;">
            <button class="btn-start" onclick="sendStart()">▶️ START</button>
            <button class="btn-stop" onclick="sendStop()">⏹️ STOP</button>
            <button class="btn-status" onclick="sendStatus()">📊 STATUS</button>
        </div>

        <div id="result">Результат появится здесь...</div>
    </div>

    <script>
        function getBaseUrl() {
            let url = document.getElementById('baseUrl').value.trim();
            if (!url.endsWith('/')) url += '/';
            return url;
        }

        function showResult(text, isError = false) {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = `<strong>${isError ? '❌ Ошибка' : '✅ Ответ'}</strong><br><br>` + 
                                  text.replace(/\n/g, '<br>');
            resultDiv.className = isError ? 'status-error' : 'status-ok';
        }

        async function makeRequest(endpoint, params = '') {
            const base = getBaseUrl();
            let url = base + endpoint;
            if (params) url += (endpoint.includes('?') ? '&' : '?') + params;

            try {
                const response = await fetch(url, {
                    method: 'GET',
                    mode: 'no-cors'   // если CORS блокирует — попробуй убрать эту строку
                });

                // Если no-cors, response.body будет недоступен, но запрос уйдёт
                showResult(`Запрос отправлен:<br><code>${url}</code><br><br>Если сервер ответил — проверь логи сервера.`);
                
                // Если хочешь попробовать прочитать ответ (убери mode: 'no-cors' если возможно)
                // const text = await response.text();
                // showResult(`URL: ${url}<br><br>Ответ: ${text}`);

            } catch (error) {
                showResult(`Не удалось отправить запрос.<br>URL: ${url}<br>Ошибка: ${error.message}`, true);
            }
        }

        function sendStart() {
            const userId = document.getElementById('userId').value.trim();
            const duration = document.getElementById('duration').value.trim();
            
            if (!userId) {
                showResult('Введите User ID!', true);
                return;
            }
            if (!duration) {
                showResult('Введите Duration!', true);
                return;
            }

            makeRequest('start', `user_id=\( {userId}&duration= \){duration}`);
        }

        function sendStop() {
            const userId = document.getElementById('userId').value.trim();
            if (!userId) {
                showResult('Введите User ID!', true);
                return;
            }
            makeRequest('stop', `user_id=${userId}`);
        }

        function sendStatus() {
            makeRequest('status');
        }

        // Автозаполнение при загрузке
        window.onload = () => {
            console.log('Панель управления загружена. Меняй Base URL когда IP меняется.');
        };
    </script>
</body>
</html>
