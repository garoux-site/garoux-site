<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GAROUX MODZ - Free Fire Info</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        body { background: #0f0f1e; color: #ffcc00; font-family: 'Press Start 2P', sans-serif; margin:0; padding:0; }
        header { background: linear-gradient(#ff0000, #000); padding:20px; text-align:center; font-size:2em; text-shadow: 0 0 10px #ffcc00; }
        .logo { font-size:2.5em; color:#fff; text-shadow: 3px 3px #ff0000; }
        .main-grid { display:grid; grid-template-columns: repeat(auto-fit, minmax(280px,1fr)); gap:20px; padding:20px; }
        .card { background:#1a1a2e; border:3px solid #ffcc00; border-radius:15px; padding:15px; text-align:center; cursor:pointer; transition:0.3s; }
        .card:hover { transform:scale(1.05); box-shadow:0 0 20px #ff0000; }
        .avatar { width:120px; height:120px; border-radius:50%; border:5px solid #ffcc00; background:#000; }
        .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:100; }
        .modal-content { background:#16213e; margin:5% auto; width:90%; max-width:800px; border:5px solid #ffcc00; padding:20px; }
        .tabs { display:flex; background:#0f0f1e; }
        .tab { padding:15px; flex:1; text-align:center; cursor:pointer; background:#1a1a2e; }
        .tab.active { background:#ffcc00; color:#000; }
        .profile-screen, .stats-screen { padding:20px; }
        .big-avatar { width:300px; height:300px; border-radius:20px; border:8px solid #ff0000; background-size:cover; margin:auto; }
        table { width:100%; border-collapse:collapse; margin-top:20px; }
        th, td { border:2px solid #ffcc00; padding:12px; text-align:center; }
        .status { font-size:1.2em; padding:10px; border-radius:10px; }
        .online { background:#00ff00; color:#000; }
        .offline { background:#ff0000; color:#fff; }
        input, button { padding:10px; font-family:inherit; background:#ffcc00; color:#000; border:none; margin:5px; }
    </style>
</head>
<body>
    <header>
        <div class="logo">GAROUX MODZ</div>
        <p style="font-size:0.8em;color:#fff;">Free Fire Info Dashboard • Обновление каждые 15 сек</p>
    </header>

    <div style="text-align:center;padding:10px;">
        <input id="newUid" placeholder="Введи UID" style="width:200px;">
        <button onclick="addAccount()">Добавить/Заменить аккаунт</button>
    </div>

    <div class="main-grid" id="accountsGrid"></div>

    <!-- Модальное окно профиля -->
    <div class="modal" id="modal">
        <div class="modal-content">
            <button onclick="closeModal()" style="float:right;background:#ff0000;color:#fff;">✕</button>
            <h2 id="modalNickname" style="text-align:center;"></h2>
            
            <div class="tabs">
                <div class="tab active" onclick="switchTab(0)">Профиль</div>
                <div class="tab" onclick="switchTab(1)">Статистика</div>
            </div>
            
            <!-- Экран 1: Профиль -->
            <div id="profileScreen" class="profile-screen">
                <div id="bigAvatar" class="big-avatar"></div>
                <p><strong>Уровень:</strong> <span id="level"></span></p>
                <p><strong>Лайки:</strong> <span id="likes"></span></p>
                <p><strong>Рейтинг:</strong> <span id="rank"></span> (RP: <span id="rp"></span>)</p>
                <p class="status" id="status"></p>
            </div>
            
            <!-- Экран 2: Статистика -->
            <div id="statsScreen" class="stats-screen" style="display:none;">
                <h3>За сегодня</h3>
                <table>
                    <tr><th>Параметр</th><th>Прирост</th><th>Всего</th></tr>
                    <tr><td>Лайки</td><td id="todayLikes">+0</td><td id="totalLikes"></td></tr>
                    <tr><td>XP</td><td id="todayExp">+0</td><td id="totalExp"></td></tr>
                    <tr><td>Рейтинг</td><td id="todayRP">+0</td><td id="totalRP"></td></tr>
                </table>
                <p><strong>До следующего уровня осталось:</strong> <span id="toNextLevel"></span> XP</p>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://flash-player-info.vercel.app/info?uid=";
        const KEY = "&key=Flash";
        
        // === ТВОИ 4 АККАУНТА (ЗАМЕНИ НА СВОИ UID) ===
        let accounts = [
            {uid: "9900005554", nickname: "Загрузка..."},
            {uid: "13777777733", nickname: "Загрузка..."},
            {uid: "14830000000", nickname: "Загрузка..."},
            {uid: "14507770000", nickname: "Загрузка..."}
        ];
        
        let currentAccountIndex = 0;
        let previousData = {}; // для дельт "за сегодня"
        
        function fetchPlayer(uid) {
            return fetch(API_URL + uid + KEY)
                .then(r => r.json())
                .catch(() => null);
        }
        
        async function updateAll() {
            const grid = document.getElementById("accountsGrid");
            grid.innerHTML = "";
            
            for (let i = 0; i < accounts.length; i++) {
                const data = await fetchPlayer(accounts[i].uid);
                if (!data || !data.basicInfo) continue;
                
                const info = data.basicInfo;
                const lastLogin = new Date(info.lastLoginAt * 1000);
                const now = new Date();
                const minutesAgo = Math.floor((now - lastLogin) / 60000);
                const status = minutesAgo < 10 ? "Онлайн" : "Офлайн";
                
                // Сохраняем дельты
                const prev = previousData[accounts[i].uid] || {};
                const deltaLikes = prev.likes ? info.liked - prev.likes : 0;
                const deltaExp = prev.exp ? info.exp - prev.exp : 0;
                const deltaRP = prev.rankingPoints ? info.rankingPoints - prev.rankingPoints : 0;
                
                previousData[accounts[i].uid] = {
                    likes: info.liked,
                    exp: info.exp,
                    rankingPoints: info.rankingPoints
                };
                
                // Карточка
                const card = document.createElement("div");
                card.className = "card";
                card.innerHTML = `
                    <img src="https://via.placeholder.com/120?text=FF" class="avatar" style="background-image:url('https://picsum.photos/id/${i+10}/300');">
                    <h3>${info.nickname}</h3>
                    <p>Ур: ${info.level} | Лайки: ${info.liked}</p>
                    <p>Рейтинг: ${info.rank}</p>
                    <p class="status \( {status === 'Онлайн' ? 'online' : 'offline'}"> \){status}</p>
                `;
                card.onclick = () => openProfile(i, data);
                grid.appendChild(card);
                
                accounts[i].nickname = info.nickname;
            }
        }
        
        function openProfile(index, data) {
            currentAccountIndex = index;
            const info = data.basicInfo;
            const profile = data.profileInfo || {};
            
            document.getElementById("modal").style.display = "block";
            document.getElementById("modalNickname").textContent = info.nickname;
            
            // Аватар + фон (пример)
            const avatarDiv = document.getElementById("bigAvatar");
            avatarDiv.style.backgroundImage = `url('https://picsum.photos/id/1015/600')`; // замени на реальный фон
            avatarDiv.style.backgroundSize = "cover";
            
            document.getElementById("level").textContent = info.level;
            document.getElementById("likes").textContent = info.liked;
            document.getElementById("rank").textContent = info.rank;
            document.getElementById("rp").textContent = info.rankingPoints;
            
            const lastLogin = new Date(info.lastLoginAt * 1000);
            const minutesAgo = Math.floor((Date.now() - lastLogin) / 60000);
            const statusEl = document.getElementById("status");
            statusEl.textContent = minutesAgo < 10 ? "ОНЛАЙН СЕЙЧАС" : `Оффлайн (${minutesAgo} мин назад)`;
            statusEl.className = minutesAgo < 10 ? "status online" : "status offline";
            
            // Статистика за сегодня
            const prev = previousData[accounts[index].uid] || {};
            document.getElementById("todayLikes").textContent = "+" + (info.liked - (prev.likes || info.liked));
            document.getElementById("todayExp").textContent = "+" + (info.exp - (prev.exp || info.exp));
            document.getElementById("todayRP").textContent = "+" + (info.rankingPoints - (prev.rankingPoints || info.rankingPoints));
            
            document.getElementById("totalLikes").textContent = info.liked;
            document.getElementById("totalExp").textContent = info.exp;
            document.getElementById("totalRP").textContent = info.rankingPoints;
            
            // До следующего уровня (примерная формула, можно доработать)
            const toNext = Math.max(0, 50000 + info.level * 2000 - (info.exp % 100000)); // заменить на точную таблицу если нужно
            document.getElementById("toNextLevel").textContent = toNext;
            
            switchTab(0);
        }
        
        function switchTab(n) {
            document.getElementById("profileScreen").style.display = n===0 ? "block" : "none";
            document.getElementById("statsScreen").style.display = n===1 ? "block" : "none";
            document.querySelectorAll(".tab").forEach((t,i)=> t.classList.toggle("active", i===n));
        }
        
        function closeModal() {
            document.getElementById("modal").style.display = "none";
        }
        
        function addAccount() {
            const uid = document.getElementById("newUid").value.trim();
            if (!uid) return alert("Введи UID!");
            accounts[3] = {uid: uid, nickname: "Загрузка..."}; // заменяет 4-й
            updateAll();
        }
        
        // Авто-обновление каждые 15 сек
        setInterval(updateAll, 15000);
        
        // Первый запуск
        window.onload = updateAll;
    </script>
</body>
</html>
