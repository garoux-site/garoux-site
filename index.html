<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FFGarouX</title>

<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  background:#05050d;
  color:#fff;
}

/* AUTH */
#auth-container {
  max-width:400px;
  margin:80px auto;
  padding:25px;
  background:#0e1022;
  border-radius:10px;
  text-align:center;
}

#auth-container input,
#auth-container button {
  width:100%;
  padding:12px;
  margin:10px 0;
  border:none;
  border-radius:6px;
}

#auth-container button {
  background:linear-gradient(90deg,#ff3c3c,#00e0ff);
  color:#fff;
  font-weight:bold;
  cursor:pointer;
}

#auth-message {
  color:#ff6b6b;
}

/* APP */
#reviews-container {
  display:none;
  max-width:600px;
  margin:40px auto;
  padding:20px;
  background:#0e1022;
  border-radius:10px;
}

textarea {
  width:100%;
  padding:10px;
  border-radius:6px;
  border:none;
  resize:none;
}

.review {
  background:#1a1c33;
  padding:10px;
  border-radius:6px;
  margin-top:10px;
}

.review small {
  display:block;
  color:#aaa;
  font-size:11px;
}
</style>
</head>

<body>

<!-- LOGIN / REGISTER -->
<div id="auth-container">
  <h2>FFGarouX</h2>

  <input type="text" id="nickname" placeholder="Ваш ник">
  <input type="password" id="password" placeholder="Пароль">

  <button id="register-btn">Регистрация</button>
  <button id="login-btn">Войти</button>

  <p id="auth-message"></p>
</div>

<!-- APP -->
<div id="reviews-container">
  <h2>Отзывы</h2>

  <textarea id="review-text" placeholder="Напишите отзыв..."></textarea>
  <button id="send-review">Отправить</button>

  <div id="reviews-list"></div>

  <button id="logout-btn" style="margin-top:15px;background:#ff4c4c;color:#fff;border:none;padding:10px;border-radius:6px;">
    Выйти
  </button>
</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.3.1/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  getDocs,
  query,
  orderBy
} from "https://www.gstatic.com/firebasejs/10.3.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCBZQzVUcx7-A5y7hgCvGjwhu4mfAWVEIE",
  authDomain: "ffgaroux-a58e7.firebaseapp.com",
  projectId: "ffgaroux-a58e7"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let currentUser = null;

// DOM
const authContainer = document.getElementById("auth-container");
const reviewsContainer = document.getElementById("reviews-container");
const nicknameInput = document.getElementById("nickname");
const passwordInput = document.getElementById("password");
const authMessage = document.getElementById("auth-message");
const reviewsList = document.getElementById("reviews-list");
const reviewText = document.getElementById("review-text");

// REGISTER
document.getElementById("register-btn").onclick = async () => {
  const nick = nicknameInput.value.trim();
  const pass = passwordInput.value.trim();
  if (!nick || !pass) {
    authMessage.textContent = "Заполните оба поля";
    return;
  }

  await addDoc(collection(db, "users"), {
    nickname: nick,
    password: pass
  });

  authMessage.textContent = "Регистрация успешна. Теперь войдите.";
};

// LOGIN
document.getElementById("login-btn").onclick = async () => {
  const nick = nicknameInput.value.trim();
  const pass = passwordInput.value.trim();

  const snap = await getDocs(collection(db, "users"));
  let found = false;

  snap.forEach(doc => {
    const u = doc.data();
    if (u.nickname === nick && u.password === pass) {
      found = true;
    }
  });

  if (!found) {
    authMessage.textContent = "Неверный ник или пароль";
    return;
  }

  currentUser = nick;
  authContainer.style.display = "none";
  reviewsContainer.style.display = "block";
  loadReviews();
};

// SEND REVIEW
document.getElementById("send-review").onclick = async () => {
  if (!reviewText.value.trim()) return;

  await addDoc(collection(db, "reviews"), {
    nickname: currentUser,
    text: reviewText.value,
    time: Date.now()
  });

  reviewText.value = "";
  loadReviews();
};

// LOAD REVIEWS
async function loadReviews() {
  reviewsList.innerHTML = "";
  const q = query(collection(db, "reviews"), orderBy("time", "desc"));
  const snap = await getDocs(q);

  snap.forEach(doc => {
    const r = doc.data();
    const div = document.createElement("div");
    div.className = "review";
    div.innerHTML = `
      <b>${r.nickname}</b>
      <small>${new Date(r.time).toLocaleString()}</small>
      <div>${r.text}</div>
    `;
    reviewsList.appendChild(div);
  });
}

// LOGOUT
document.getElementById("logout-btn").onclick = () => {
  currentUser = null;
  reviewsContainer.style.display = "none";
  authContainer.style.display = "block";
};
</script>

</body>
</html>
