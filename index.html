<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FFLevel.pro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body {
      background: #0a0a0a;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #ddd;
    }
    .card {
      background: #111111;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    }
    .progress-bg {
      background: #1f1f1f;
    }
  </style>
</head>
<body class="min-h-screen pb-8">

  <div class="max-w-2xl mx-auto pt-6 px-4">
    <!-- Header -->
    <div class="flex items-center justify-between mb-6">
      <div class="flex items-center gap-3">
        <div class="w-11 h-11 bg-gradient-to-br from-emerald-500 to-green-600 rounded-2xl flex items-center justify-center text-white text-3xl shadow-lg">
          🔥
        </div>
        <div>
          <h1 class="text-3xl font-bold tracking-tighter">FFLEVEL.PRO</h1>
        </div>
      </div>
    </div>

    <!-- Search -->
    <div class="mb-8">
      <div class="relative">
        <input 
          id="uidInput"
          type="text" 
          placeholder="Введите UID (например: 9900005554)"
          class="w-full bg-zinc-900 border border-zinc-700 focus:border-emerald-500 rounded-3xl px-7 py-5 text-lg outline-none transition-all"
          onkeypress="if(event.key === 'Enter') fetchPlayer()">
        <button 
          onclick="fetchPlayer()"
          class="absolute right-3 top-1/2 -translate-y-1/2 bg-emerald-600 hover:bg-emerald-500 px-10 py-4 rounded-3xl font-semibold transition-colors">
          Поиск
        </button>
      </div>
    </div>

    <!-- Результат -->
    <div id="result" class="hidden card p-8"></div>

    <!-- Заглушка -->
    <div id="placeholder" class="card p-12 text-center text-zinc-400">
      <i class="fa-solid fa-user-magnifying-glass text-7xl mb-6 opacity-40"></i>
      <p class="text-xl font-medium">Введите UID игрока Free Fire</p>
      <p class="text-sm mt-3">Данные берутся с gojoinfoapi-mu.vercel.app</p>
    </div>
  </div>

  <script>
    async function fetchPlayer() {
      let uid = document.getElementById('uidInput').value.trim();
      if (!uid) {
        alert("Введите UID игрока!");
        return;
      }

      const url = `https://gojoinfoapi-mu.vercel.app/get?uid=${uid}&region=RU`;
      const resultDiv = document.getElementById('result');
      const placeholder = document.getElementById('placeholder');

      resultDiv.classList.remove('hidden');
      placeholder.classList.add('hidden');

      resultDiv.innerHTML = `
        <div class="flex justify-center py-16">
          <div class="animate-spin w-12 h-12 border-4 border-emerald-500 border-t-transparent rounded-full"></div>
        </div>
      `;

      try {
        const res = await fetch(url);
        const data = await res.json();

        // Поддержка двух возможных структур ответа API
        let nickname = "Неизвестно";
        let level = "?";
        let totalExp = "0";
        let avatarUrl = "https://via.placeholder.com/120/1f2937/ffffff?text=FF";

        if (data.AccountInfo || data.captainBasicInfo) {
          // Основная структура (как у 9900005554)
          nickname = data.captainBasicInfo?.nickname || data.AccountInfo?.AccountName || "Unknown";
          level = data.captainBasicInfo?.level || data.AccountInfo?.AccountLevel || "?";
          totalExp = data.captainBasicInfo?.exp || data.AccountInfo?.AccountEXP || "0";
        } else if (data.nickname) {
          // Альтернативная структура (как у 9900005551)
          nickname = data.nickname;
          level = data.level || "?";
          totalExp = data.total_exp || data.exp_current_xp || "0";
        }

        resultDiv.innerHTML = `
          <div class="flex items-center gap-6 mb-8">
            <img src="${avatarUrl}" alt="avatar" class="w-24 h-24 rounded-3xl border-4 border-zinc-700 object-cover">
            <div class="flex-1">
              <h2 class="text-3xl font-bold">${nickname}</h2>
              <p class="text-emerald-400 text-xl mt-1">Уровень ${level}</p>
              <p class="text-zinc-500 text-sm mt-2">UID: ${uid}</p>
            </div>
          </div>

          <div class="bg-zinc-900 rounded-3xl p-6 mb-6">
            <p class="text-zinc-400 text-sm">Всего ачков уровня (EXP)</p>
            <p class="text-4xl font-bold text-white mt-2">${Number(totalExp).toLocaleString('ru-RU')}</p>
          </div>

          <div class="text-xs text-zinc-500 flex justify-between">
            <p>Регион: RU</p>
            <p>Данные обновлены только что</p>
          </div>
        `;

      } catch (error) {
        resultDiv.innerHTML = `
          <div class="text-red-400 text-center py-12">
            <i class="fa-solid fa-circle-exclamation text-5xl mb-4"></i>
            <p class="text-xl">Ошибка загрузки</p>
            <p class="text-sm mt-2">Проверьте правильность UID или подключение к интернету</p>
          </div>
        `;
      }
    }
  </script>
</body>
</html>
