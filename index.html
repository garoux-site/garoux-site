<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FFGarouX Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body { background: #0a0a0a; color: #ddd; font-family: 'Inter', sans-serif; }
    
    /* Основная карта как на скриншоте */
    .card { 
      background: #121212; 
      border-radius: 20px; 
      padding: 24px;
      border: 1px solid #1f1f1f;
    }

    .site-title {
      font-size: 2.2rem; font-weight: 800;
      background: linear-gradient(to right, #f59e0b, #fbbf24);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }

    /* Аватарка с эффектом стекла */
    .glow-avatar {
      position: relative; width: 70px; height: 70px; 
      overflow: hidden; border-radius: 8px; background: #1a1a1a;
    }
    .glow-avatar img { width: 100%; height: 100%; object-fit: cover; }
    
    .avatar-shine {
      position: absolute; top: 0; left: -150%; width: 60%; height: 100%;
      background: linear-gradient(to right, transparent, rgba(255,255,255,0.3), transparent);
      transform: skewX(-20deg);
      animation: glassEffect 4s infinite;
    }
    @keyframes glassEffect { 0% { left: -150%; } 25% { left: 150%; } 100% { left: 150%; } }

    /* Полоска прогресса */
    .progress-container { background: #1a1a1a; height: 6px; border-radius: 10px; margin-top: 8px; }
    .progress-bar { 
      height: 100%; background: #059669; border-radius: 10px; 
      transition: width 1.5s cubic-bezier(0.4, 0, 0.2, 1); 
    }

    /* Блоки Current и Remaining */
    .stat-box { background: #181818; border-radius: 16px; padding: 18px; border: 1px solid #222; }

    .live-dot { animation: blink 2s infinite; }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }

    .btn-update { background: #262626; color: white; }
    .btn-delete { background: #991b1b; color: white; }
    .btn-add { background: #10b981; color: black; font-weight: 700; }
  </style>
</head>
<body class="min-h-screen pb-12 px-4">

<div class="max-w-md mx-auto pt-10">
  <div class="flex items-center justify-between mb-10">
    <div class="flex items-center gap-3">
      <img src="GAROUXa.jpg" class="w-10 h-10 rounded-lg shadow-[0_0_10px_rgba(245,158,11,0.5)]">
      <h1 class="site-title tracking-tight">FFGarouX</h1>
    </div>
    <button onclick="refreshAll()" class="bg-zinc-800/50 text-zinc-400 px-4 py-2 rounded-xl text-xs font-bold border border-zinc-700">
      <i class="fa-solid fa-rotate mr-1"></i> Refresh All
    </button>
  </div>

  <div id="mainAccounts" class="space-y-6"></div>

  <div class="mt-10 flex gap-2">
    <input id="uidInput" type="text" placeholder="Добавить новый UID" 
           class="flex-1 bg-zinc-900 border border-zinc-800 p-4 rounded-2xl outline-none focus:border-emerald-500 text-white transition-all">
    <button onclick="addNewAccount()" class="btn-add px-8 rounded-2xl transition-transform active:scale-95">Добавить</button>
  </div>
</div>

<script>
// Таблица опыта (Level: [Start_EXP, Need_to_Next])
const EXP_TABLE = { 1:[0,48],2:[48,154],3:[202,342],4:[544,468],5:[1012,832],6:[1844,948],7:[2792,1008],8:[3800,1070],9:[4870,1134],10:[6004,1188],11:[7192,1256],12:[8448,1328],13:[9776,1364],14:[11140,1426],15:[12566,1494],16:[14060,1550],17:[15610,1614],18:[17224,1678],19:[18902,1730],20:[20632,1792],21:[22424,2304],22:[24728,1464],23:[26192,1974],24:[28166,2034],25:[30200,2094],26:[32294,2154],27:[34448,3356],28:[37804,3370],29:[41174,3696],30:[44870,3982],31:[48852,4482],32:[53334,5232],33:[58566,5530],34:[64096,5898],35:[69994,6466],36:[76460,6648],37:[83108,8020],38:[91128,8194],39:[99322,8770],40:[108092,12052],41:[120144,13122],42:[133266,14206],43:[147472,15288],44:[162760,16366],45:[179126,17446],46:[196572,18796],47:[215368,20148],48:[235516,21494],49:[257010,22850],50:[279860,24196],51:[304056,44262],52:[348318,46664],53:[394982,49062],54:[444044,51464],55:[495508,53856],56:[549364,84392],57:[633756,87988],58:[721744,91592],59:[813336,95186],60:[908522,132916],61:[1041438,138914],62:[1180352,144904],63:[1325256,150928],64:[1476184,158116],65:[1634300,206646],66:[1840946,215648],67:[2056594,224648],68:[2281242,233638],69:[2514880,242650],70:[2757530,301976],71:[3059506,312778],72:[3372284,327172],73:[3699456,341574],74:[4041030,355990],75:[4397020,432084],76:[4829104,453100],77:[5282204,474100],78:[5756304,495100],79:[6251404,516100],80:[6767504,613820],81:[7381324,661830],82:[8043154,709798],83:[8752952,757856],84:[9510808,804830],85:[10316638,960552],86:[11277190,1083558],87:[12360748,999556],88:[13360304,1122554],89:[14482858,1170560],90:[15659418,1367290],91:[17026708,1426980],92:[18453688,1488592],93:[19941280,1546280],94:[21488570,1606288],95:[23095858,1665280],96:[24763138,1722000],97:[26490138,1787570],98:[28277708,1847288],99:[30124996,1907288],100:[32032284,0] };

let accounts = JSON.parse(localStorage.getItem('ff_pro_data') || '[]');

function save() { localStorage.setItem('ff_pro_data', JSON.stringify(accounts)); }

function getStats(totalExp) {
    let lvl = 1, base = 0, next = 48;
    for (let l = 1; l <= 100; l++) {
        if (totalExp >= EXP_TABLE[l][0]) { lvl = l; base = EXP_TABLE[l][0]; next = EXP_TABLE[l][1]; }
        else break;
    }
    let currentInLvl = totalExp - base;
    let rem = Math.max(0, next - currentInLvl);
    let perc = next > 0 ? (currentInLvl / next) * 100 : 100;
    return { lvl, perc: perc.toFixed(0), currentInLvl, rem, next };
}

async function updateAccount(i) {
    try {
        // ТВОЯ НОВАЯ ССЫЛКА (bingo-subtle-chairman-usc)
        const apiUrl = `https://bingo-subtle-chairman-usc.trycloudflare.com/player-info?uid=${accounts[i].uid}`;
        
        const res = await fetch(apiUrl);
        if (!res.ok) throw new Error('Сеть не отвечает');
        
        const data = await res.json();
        
        // В твоем новом коде данные лежат в basicInfo
        const info = data.basicInfo; 
        
        // Чтение никнейма из кириллического ключа
        const name = info["никнейм"] || info.nickname || "Unknown";
        const totalExp = parseInt(info.exp || 0);
        
        if (!accounts[i].sessionStartExp) accounts[i].sessionStartExp = totalExp;
        
        accounts[i].name = name;
        accounts[i].lastExp = totalExp;
        accounts[i].todayExp = totalExp - accounts[i].sessionStartExp;
        
        Object.assign(accounts[i], getStats(totalExp));
        save(); render();
    } catch (e) { console.error("Update error:", e); }
}

function getResetTime() {
    const now = new Date();
    const h = 23 - now.getHours();
    const m = 59 - now.getMinutes();
    return `${h}ч ${m}м`;
}

function render() {
    const container = document.getElementById('mainAccounts');
    container.innerHTML = '';
    accounts.forEach((acc, i) => {
        container.innerHTML += `
            <div class="card space-y-6">
                <div class="flex items-center gap-4">
                    <div class="glow-avatar">
                        <img src="avag.jpg" onerror="this.src='https://via.placeholder.com/70?text=Ava'">
                        <div class="avatar-shine"></div>
                    </div>
                    <div>
                        <div class="flex items-center gap-2">
                            <h2 class="text-xl font-bold text-white">${acc.name || 'Unknown'}</h2>
                            <span class="bg-emerald-500/10 text-emerald-500 text-[10px] px-2 py-0.5 rounded-full flex items-center gap-1 font-bold border border-emerald-500/20">
                                <span class="w-2 h-2 bg-emerald-500 rounded-full live-dot"></span> LIVE
                            </span>
                        </div>
                        <p class="text-zinc-500 text-xs mt-0.5 font-medium">UID: ${acc.uid}</p>
                        <p class="text-emerald-500 font-bold text-lg">Level ${acc.lvl || 1}</p>
                    </div>
                </div>

                <div>
                    <div class="flex justify-between text-[11px] font-bold">
                        <span class="text-emerald-500">${acc.perc || 0}% Progress</span>
                        <span class="text-zinc-500">${(acc.currentInLvl || 0).toLocaleString()} / ${(acc.next || 48).toLocaleString()} EXP</span>
                    </div>
                    <div class="progress-container"><div class="progress-bar" style="width: ${acc.perc || 0}%"></div></div>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div class="stat-box">
                        <p class="text-zinc-500 text-[10px] uppercase font-bold mb-1">Current EXP</p>
                        <p class="text-2xl font-bold text-zinc-200">${(acc.currentInLvl || 0).toLocaleString()}</p>
                    </div>
                    <div class="stat-box">
                        <p class="text-zinc-500 text-[10px] uppercase font-bold mb-1">Remaining XP</p>
                        <p class="text-2xl font-bold text-orange-500">${(acc.rem || 48).toLocaleString()}</p>
                    </div>
                </div>

                <div class="space-y-3 text-sm border-t border-zinc-800/50 pt-4">
                    <div class="flex justify-between">
                        <span class="text-zinc-500">Было при добавлении:</span>
                        <span class="text-zinc-400 font-medium">${(acc.sessionStartExp || 0).toLocaleString()}</span>
                    </div>
                    <div class="flex justify-between">
                        <span class="text-emerald-600 font-bold">Добавилось за сессию:</span>
                        <span class="text-emerald-500 font-black">+${(acc.todayExp || 0).toLocaleString()}</span>
                    </div>
                    <div class="flex justify-between">
                        <span class="text-zinc-500">На данный момент:</span>
                        <span class="text-zinc-300 font-bold">${(acc.lastExp || 0).toLocaleString()}</span>
                    </div>
                </div>

                <div class="bg-zinc-900/50 p-4 rounded-2xl text-center text-xs font-medium border border-zinc-800/50">
                    <span class="text-amber-500/70">До сброса сессии:</span> 
                    <span class="text-amber-500 font-bold ml-1">${getResetTime()}</span>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <button onclick="updateAccount(${i})" class="btn-update py-4 rounded-2xl font-bold text-sm hover:brightness-125 transition active:scale-95">Обновить</button>
                    <button onclick="deleteAcc(${i})" class="btn-delete py-4 rounded-2xl font-bold text-sm hover:brightness-110 transition active:scale-95">Удалить</button>
                </div>
            </div>
        `;
    });
}

async function addNewAccount() {
    const input = document.getElementById('uidInput');
    const uid = input.value.trim();
    if(!uid || accounts.some(a => a.uid === uid)) return;
    accounts.push({ uid, sessionStartExp: 0 });
    save(); input.value = '';
    await updateAccount(accounts.length - 1);
}

function deleteAcc(i) { if(confirm('Удалить?')) { accounts.splice(i, 1); save(); render(); } }
function refreshAll() { accounts.forEach((_, i) => updateAccount(i)); }

render(); 
refreshAll();
setInterval(render, 30000); // Обновлять таймер
setInterval(refreshAll, 60000); // Авто-обновление данных раз в минуту
</script>

</body>
</html>
