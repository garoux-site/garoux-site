<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FFGarouX</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body { 
      background: #0a0a0a; 
      color: #ddd; 
      font-family: system-ui, sans-serif; 
    }
    .card { 
      background: #111111; 
      border-radius: 16px; 
    }

    .site-title {
      font-size: 2.85rem; 
      font-weight: 900; 
      letter-spacing: -2px;
      background: linear-gradient(135deg, #fbbf24, #f59e0b, #fb923c, #f97316, #fbbf24);
      background-size: 300% 300%; 
      -webkit-background-clip: text; 
      -webkit-text-fill-color: transparent;
      animation: titleDiagonal 7s linear infinite;
    }
    @keyframes titleDiagonal { 
      0% { background-position: 0% 0%; } 
      50% { background-position: 100% 100%; } 
      100% { background-position: 0% 0%; } 
    }

    /* === ЯРКАЯ СВЕТОВАЯ ВОЛНА НА АВАТАРЕ === */
    .glow-avatar {
      position: relative; 
      width: 80px; 
      height: 80px; 
      overflow: hidden;
      border: 3px solid #27272a;
      box-shadow: 0 0 25px rgba(245, 158, 11, 0.5);
      border-radius: 0;
    }

    .glow-avatar img { 
      width: 100%; 
      height: 100%; 
      object-fit: cover; 
      transition: transform 0.6s ease;
      display: block;
    }

    .glow-avatar:hover img { 
      transform: scale(1.08); 
    }

    /* Белая световая волна поверх аватара */
    .avatar-shine {
      position: absolute;
      top: -150%;
      left: -150%;
      width: 60%;
      height: 400%;
      background: linear-gradient(
        135deg,
        transparent 25%,
        rgba(255, 255, 255, 0.95) 40%,
        rgba(255, 255, 255, 0.85) 48%,
        rgba(255, 245, 200, 0.75) 52%,
        rgba(255, 255, 255, 0.9) 57%,
        transparent 75%
      );
      animation: avatarSurfaceShine 10s linear infinite;
      pointer-events: none;
      z-index: 10;           /* Поверх изображения */
      mix-blend-mode: screen; /* Делает блик ярче и естественнее */
      opacity: 0.85;
    }

    @keyframes avatarSurfaceShine {
      0% {
        transform: translate(-180%, -180%) rotate(-10deg);
      }
      9% {
        transform: translate(320%, 320%) rotate(-10deg);
      }
      100% {
        transform: translate(320%, 320%) rotate(-10deg);
      }
    }

    .progress-container { 
      background: #1f1f1f; 
      height: 10px; 
      border-radius: 9999px; 
      overflow: hidden; 
    }
    .progress-bar { 
      height: 100%; 
      background: linear-gradient(90deg, #166534, #4ade80, #22c55e, #4ade80);
      background-size: 200% 100%; 
      animation: progressFlow 3s linear infinite;
    }
    @keyframes progressFlow { 
      0% { background-position: 0% 50%; } 
      100% { background-position: 200% 50%; } 
    }

    .glow-btn { 
      position: relative; 
      overflow: hidden; 
      transition: all 0.3s ease; 
    }
    .glow-btn::before {
      content: ''; 
      position: absolute; 
      top: -50%; 
      left: -100%; 
      width: 40%; 
      height: 200%;
      background: linear-gradient(120deg, transparent, rgba(255,255,255,0.7), transparent);
      transition: 0.8s;
    }
    .glow-btn:hover::before { left: 200%; }

    .btn-green:hover { box-shadow: 0 0 20px #4ade80; transform: translateY(-2px); }
    .btn-red:hover   { box-shadow: 0 0 20px #ef4444; transform: translateY(-2px); }
    .btn-orange:hover{ box-shadow: 0 0 20px #f59e0b; transform: translateY(-2px); }

    .live-dot { animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
  </style>
</head>
<body class="min-h-screen pb-12">

<div class="max-w-xl mx-auto pt-8 px-4">
  <div class="flex items-center justify-between mb-8">
    <div class="flex items-center gap-3">
      <div class="w-10 h-10 rounded-2xl overflow-hidden border border-amber-500 flex-shrink-0 shadow-[0_0_15px_#f59e0b]">
        <img src="GAROUXa.jpg" alt="GAROUX" class="w-full h-full object-cover">
      </div>
      <h1 class="site-title">FFGarouX</h1>
    </div>
    <button onclick="refreshAll()" class="glow-btn btn-orange flex items-center gap-2 bg-zinc-800 hover:bg-zinc-700 px-6 py-3 rounded-2xl text-sm font-medium">
      <i class="fa-solid fa-rotate"></i> Refresh All
    </button>
  </div>

  <div id="mainAccounts" class="space-y-8"></div>

  <div class="my-10">
    <div class="flex gap-3">
      <input id="uidInput" type="text" placeholder="Добавить новый UID" 
             class="flex-1 bg-zinc-900 border border-zinc-700 focus:border-green-500 rounded-3xl px-6 py-4 text-lg outline-none">
      <button onclick="addNewAccount()" class="glow-btn btn-green bg-green-500 hover:bg-green-600 px-10 py-4 rounded-3xl font-semibold text-black">
        Добавить
      </button>
    </div>
  </div>
</div>

<script>
// ==================== EXP TABLE ====================
const EXP_TABLE = { 
  1: [0,48],2:[48,154],3:[202,342],4:[544,468],5:[1012,832],6:[1844,948],7:[2792,1008],
  8:[3800,1070],9:[4870,1134],10:[6004,1188],11:[7192,1256],12:[8448,1328],13:[9776,1364],
  14:[11140,1426],15:[12566,1494],16:[14060,1550],17:[15610,1614],18:[17224,1678],
  19:[18902,1730],20:[20632,1792],21:[22424,2304],22:[24728,1464],23:[26192,1974],
  24:[28166,2034],25:[30200,2094],26:[32294,2154],27:[34448,3356],28:[37804,3370],
  29:[41174,3696],30:[44870,3982],31:[48852,4482],32:[53334,5232],33:[58566,5530],
  34:[64096,5898],35:[69994,6466],36:[76460,6648],37:[83108,8020],38:[91128,8194],
  39:[99322,8770],40:[108092,12052],41:[120144,13122],42:[133266,14206],43:[147472,15288],
  44:[162760,16366],45:[179126,17446],46:[196572,18796],47:[215368,20148],48:[235516,21494],
  49:[257010,22850],50:[279860,24196],51:[304056,44262],52:[348318,46664],53:[394982,49062],
  54:[444044,51464],55:[495508,53856],56:[549364,84392],57:[633756,87988],58:[721744,91592],
  59:[813336,95186],60:[908522,132916],61:[1041438,138914],62:[1180352,144904],
  63:[1325256,150928],64:[1476184,158116],65:[1634300,206646],66:[1840946,215648],
  67:[2056594,224648],68:[2281242,233638],69:[2514880,242650],70:[2757530,301976],
  71:[3059506,312778],72:[3372284,327172],73:[3699456,341574],74:[4041030,355990],
  75:[4397020,432084],76:[4829104,453100],77:[5282204,474100],78:[5756304,495100],
  79:[6251404,516100],80:[6767504,613820],81:[7381324,661830],82:[8043154,709798],
  83:[8752952,757856],84:[9510808,804830],85:[10316638,960552],86:[11277190,1083558],
  87:[12360748,999556],88:[13360304,1122554],89:[14482858,1170560],90:[15659418,1367290],
  91:[17026708,1426980],92:[18453688,1488592],93:[19941280,1546280],94:[21488570,1606288],
  95:[23095858,1665280],96:[24763138,1722000],97:[26490138,1787570],98:[28277708,1847288],
  99:[30124996,1907288],100:[32032284,0]
};

let accounts = [];

function loadAccounts() {
  const saved = localStorage.getItem('fflevel_accounts');
  accounts = saved ? JSON.parse(saved) : [];
}

function saveAccounts() {
  localStorage.setItem('fflevel_accounts', JSON.stringify(accounts));
}

function calculateProgress(totalExp) {
  let level = 1, baseExp = 0, needForNext = 48;
  for (let lvl = 1; lvl <= 100; lvl++) {
    if (EXP_TABLE[lvl]) {
      if (totalExp >= EXP_TABLE[lvl][0]) {
        level = lvl;
        baseExp = EXP_TABLE[lvl][0];
        needForNext = EXP_TABLE[lvl][1] || 0;
      } else break;
    }
  }
  const currentInLevel = totalExp - baseExp;
  const remaining = Math.max(0, needForNext - currentInLevel);
  const progress = needForNext > 0 ? (currentInLevel / needForNext) * 100 : 100;
  return { level, progress: parseFloat(progress.toFixed(2)), currentInLevel, remaining, needForNext };
}

function getTimeUntilReset(sessionStart) {
  const now = Date.now();
  const resetTime = sessionStart + 24 * 60 * 60 * 1000;
  const remaining = Math.max(0, resetTime - now);
  const hours = Math.floor(remaining / (1000 * 60 * 60));
  const minutes = Math.floor((remaining % (1000 * 60 * 60)) / (1000 * 60));
  return `${hours}ч ${minutes}м`;
}

async function updateAccount(index) {
  const acc = accounts[index];
  if (!acc) return;
  try {
    const res = await fetch(`https://gojoinfoapi-mu.vercel.app/get?uid=${acc.uid}&region=RU`);
    const raw = await res.json();
    const captain = raw.captainBasicInfo || {};
    const accountInfo = raw.AccountInfo || {};
    let totalExpNow = parseInt(accountInfo.AccountEXP || captain.exp || 0);
    let nickname = accountInfo.AccountName || captain.nickname || "Unknown";

    if (totalExpNow === 0 && captain.exp) {
      totalExpNow = parseInt(captain.exp);
      nickname = captain.nickname || nickname;
    }

    const now = Date.now();
    const hoursPassed = (now - (acc.sessionStart || now)) / (1000 * 60 * 60);

    if (hoursPassed >= 24) {
      acc.sessionStart = now;
      acc.sessionStartExp = totalExpNow;
      acc.todayExp = 0;
    }
    if (!acc.sessionStartExp || acc.sessionStartExp === 0) {
      acc.sessionStartExp = totalExpNow;
    }

    acc.todayExp = Math.max(0, totalExpNow - acc.sessionStartExp);
    acc.lastExp = totalExpNow;
    acc.nickname = nickname;
    acc.lastUpdateTime = now;

    const levelInfo = calculateProgress(totalExpNow);
    Object.assign(acc, levelInfo);

    saveAccounts();
    renderMainAccounts();
  } catch (e) {
    console.error("Ошибка обновления:", e);
  }
}

function renderMainAccounts() {
  const container = document.getElementById('mainAccounts');
  container.innerHTML = '';

  accounts.forEach((acc, index) => {
    const timerText = getTimeUntilReset(acc.sessionStart || Date.now());

    const cardHTML = `
      <div class="card p-6 space-y-6">
        <div class="flex items-center gap-4">
          <div class="glow-avatar flex-shrink-0">
            <img src="avag.jpg" alt="Avatar" 
                 onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 100 100%27%3E%3Ctext y=%27.9em%27 font-size=%2790%27%3E🔥%3C/text%3E%3C/svg%27';">
            <div class="avatar-shine"></div>
          </div>
          <div class="flex-1">
            <div class="flex items-center gap-3">
              <h2 class="text-2xl font-bold">${acc.nickname}</h2>
              <span class="bg-emerald-600 text-white text-xs px-4 py-1 rounded-full flex items-center gap-1.5">
                <span class="w-2.5 h-2.5 bg-white rounded-full live-dot"></span> LIVE
              </span>
            </div>
            <p class="text-emerald-400">UID: ${acc.uid}</p>
            <p class="text-emerald-400 text-xl">Level ${acc.level}</p>
          </div>
        </div>

        <div>
          <div class="flex justify-between text-sm mb-1">
            <span class="text-green-400 font-semibold">${acc.progress || 0}% Progress</span>
            <span class="text-zinc-400">${(acc.currentInLevel || 0).toLocaleString('ru-RU')} / ${(acc.needForNext || 48).toLocaleString('ru-RU')} EXP</span>
          </div>
          <div class="progress-container">
            <div class="progress-bar" style="width: ${acc.progress || 0}%"></div>
          </div>
        </div>

        <div class="grid grid-cols-2 gap-4">
          <div class="bg-zinc-900 rounded-3xl p-5">
            <p class="text-zinc-400 text-xs">Current EXP</p>
            <p class="text-3xl font-bold">${(acc.lastExp || 0).toLocaleString('ru-RU')}</p>
          </div>
          <div class="bg-zinc-900 rounded-3xl p-5">
            <p class="text-zinc-400 text-xs">Remaining XP</p>
            <p class="text-3xl font-bold text-orange-400">${(acc.remaining || 0).toLocaleString('ru-RU')}</p>
          </div>
        </div>

        <div class="bg-zinc-900 rounded-3xl p-5 space-y-3 text-sm">
          <div class="flex justify-between">
            <span class="text-zinc-400">Было при добавлении:</span>
            <span>${(acc.sessionStartExp || 0).toLocaleString('ru-RU')}</span>
          </div>
          <div class="flex justify-between text-green-400">
            <span>Добавилось за сессию:</span>
            <span class="font-bold">+${(acc.todayExp || 0).toLocaleString('ru-RU')}</span>
          </div>
          <div class="flex justify-between border-t border-zinc-700 pt-3">
            <span class="text-zinc-400">На данный момент:</span>
            <span class="font-bold">${(acc.lastExp || 0).toLocaleString('ru-RU')}</span>
          </div>
        </div>

        <div class="bg-zinc-900 rounded-3xl p-4 text-center text-sm text-amber-400">
          До сброса сессии: <span class="font-semibold">${timerText}</span>
        </div>

        <div class="flex gap-3">
          <button onclick="updateAccount(${index})" class="glow-btn btn-green flex-1 bg-zinc-800 py-4 rounded-2xl text-sm font-medium">Обновить</button>
          <button onclick="deleteAccount(${index})" class="glow-btn btn-red flex-1 bg-red-600 hover:bg-red-500 py-4 rounded-2xl text-sm font-medium">Удалить</button>
        </div>
      </div>`;

    container.innerHTML += cardHTML;
  });
}

function deleteAccount(index) {
  if (confirm("Удалить этот аккаунт?")) {
    accounts.splice(index, 1);
    saveAccounts();
    renderMainAccounts();
  }
}

async function addNewAccount() {
  const uid = document.getElementById('uidInput').value.trim();
  if (!uid) return alert("Введите UID!");
  if (accounts.some(a => a.uid === uid)) return alert("Этот UID уже добавлен!");

  const now = Date.now();
  accounts.push({
    uid,
    lastExp: 0,
    todayExp: 0,
    sessionStart: now,
    sessionStartExp: 0,
    nickname: "Загрузка...",
    level: 1,
    progress: 0,
    currentInLevel: 0,
    remaining: 48,
    needForNext: 48
  });

  saveAccounts();
  renderMainAccounts();
  await updateAccount(accounts.length - 1);
}

function refreshAll() {
  accounts.forEach((_, i) => updateAccount(i));
}

// Запуск
loadAccounts();
refreshAll();

// Автообновление
setInterval(refreshAll, 30000);
setInterval(renderMainAccounts, 60000);
</script>
</body>
</html>
