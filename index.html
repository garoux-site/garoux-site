<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js";
  import { getDatabase, ref, push, onValue, set } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCBZQzVUcx7-A5y7hgCvGjwhu4mfAWVEIE",
    authDomain: "ffgaroux-a58e7.firebaseapp.com",
    projectId: "ffgaroux-a58e7",
    storageBucket: "ffgaroux-a58e7.firebasestorage.app",
    messagingSenderId: "967486028392",
    appId: "1:967486028392:web:3de0f014b77d0ac27659dd",
    measurementId: "G-Y1VCLD1VKM",
    databaseURL: "https://ffgaroux-a58e7-default-rtdb.europe-west1.firebasedatabase.app/"
  };

  console.log("Попытка подключения к Firebase...");
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getDatabase(app);
  console.log("Firebase подключён успешно");

  onAuthStateChanged(auth, (user) => {
    if (user) {
      console.log("Пользователь вошёл:", user.uid);
      document.getElementById('authPage').style.display = 'none';
      document.getElementById('dashboard').style.display = 'block';
      loadMessages();
    } else {
      console.log("Пользователь вышел или не авторизован");
      document.getElementById('authPage').style.display = 'flex';
      document.getElementById('dashboard').style.display = 'none';
    }
  });

  window.signUp = function() {  // <-- window. делает функцию глобальной для onclick
    console.log("Нажата кнопка Sign Up");
    const username = document.getElementById('signUpUsername').value.trim();
    const password = document.getElementById('signUpPassword').value.trim();
    const confirm = document.getElementById('signUpConfirm').value.trim();

    if (!username) {
      document.getElementById('regMessage').innerText = 'Введите ник!';
      return;
    }
    if (password !== confirm) {
      document.getElementById('regMessage').innerText = 'Пароли не совпадают!';
      return;
    }

    const fakeEmail = `${username.toLowerCase()}@fake.ffgaroux.com`;
    console.log("Попытка регистрации:", fakeEmail);

    createUserWithEmailAndPassword(auth, fakeEmail, password)
      .then((userCredential) => {
        console.log("Регистрация успешна:", userCredential.user.uid);
        set(ref(db, 'users/' + userCredential.user.uid), { username });
        document.getElementById('regMessage').innerText = '';
        alert('Регистрация успешна! Теперь войдите под ником: ' + username);
        showLogin();
      })
      .catch((error) => {
        console.error("Ошибка регистрации:", error.code, error.message);
        if (error.code === 'auth/email-already-in-use') {
          document.getElementById('regMessage').innerText = 'Этот ник уже занят!';
        } else if (error.code === 'auth/weak-password') {
          document.getElementById('regMessage').innerText = 'Пароль слишком слабый (минимум 6 символов)!';
        } else {
          document.getElementById('regMessage').innerText = 'Ошибка: ' + error.message;
        }
      });
  };

  window.signIn = function() {  // <-- window. для onclick
    console.log("Нажата кнопка Sign In");
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value.trim();

    if (!username) {
      document.getElementById('authMessage').innerText = 'Введите ник!';
      return;
    }

    const fakeEmail = `${username.toLowerCase()}@fake.ffgaroux.com`;
    console.log("Попытка входа:", fakeEmail);

    signInWithEmailAndPassword(auth, fakeEmail, password)
      .then(() => {
        console.log("Вход успешен");
        document.getElementById('authMessage').innerText = '';
        alert('Вход успешен!');
      })
      .catch((error) => {
        console.error("Ошибка входа:", error.code, error.message);
        document.getElementById('authMessage').innerText = 'Нет такого аккаунта или неверный пароль!';
      });
  };

  window.logout = function() {
    signOut(auth).then(() => {
      console.log("Выход выполнен");
      alert('Вы вышли');
    });
  };

  window.showSignUp = function() {
    console.log("Переход на регистрацию");
    document.getElementById('loginForm').style.display = 'none';
    document.getElementById('signUpForm').style.display = 'block';
    document.getElementById('authMessage').innerText = '';
    document.getElementById('regMessage').innerText = '';
  };

  window.showLogin = function() {
    console.log("Переход на вход");
    document.getElementById('signUpForm').style.display = 'none';
    document.getElementById('loginForm').style.display = 'block';
    document.getElementById('authMessage').innerText = '';
    document.getElementById('regMessage').innerText = '';
  };

  // Чат и остальные функции (оставь как было, или вставь из предыдущего кода)
  function sendMessage() {
    const name = document.getElementById('chatName').value || 'Гость';
    const text = document.getElementById('chatText').value;
    if (!text) return;
    push(ref(db, 'messages'), { name, text, timestamp: Date.now() });
    document.getElementById('chatText').value = '';
  }

  function loadMessages() {
    onValue(ref(db, 'messages'), (snap) => {
      const div = document.getElementById('chatMessages');
      div.innerHTML = '';
      snap.forEach(child => {
        const msg = child.val();
        div.innerHTML += `<div class="message"><strong>${msg.name}</strong>: ${msg.text}</div>`;
      });
      div.scrollTop = div.scrollHeight;
    });
  }

  async function searchUID() {
    const uid = document.getElementById('uidInput').value.trim();
    const result = document.getElementById('uidResult');
    if (!uid) return result.innerText = 'Введите UID!';
    result.innerText = 'Загрузка...';
    try {
      const res = await fetch(`https://info-ob49.vercel.app/api/account/?uid=${uid}&region=ru`);
      if (!res.ok) throw new Error('Ошибка API');
      const data = await res.json();
      if (!data.basicInfo) throw new Error('Игрок не найден');
      const b = data.basicInfo, c = data.clanBasicInfo || {}, s = data.socialInfo || {};
      result.innerText = `Ник: ${b.nickname || '—'}\nUID: ${b.accountId || uid}\nУровень: ${b.level || '—'}\nЛайки: ${b.liked || '—'}\nBR Rank: \( {b.rank || '—'} ( \){b.rankingPoints || '—'})\nКлан: ${c.clanName || 'Нет'}\nПодпись: ${s.signature || '—'}`;
    } catch (e) { result.innerText = `Ошибка: ${e.message}`; }
  }

  function showSection(id) {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');
  }
             </script>
