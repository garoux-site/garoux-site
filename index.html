<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FFLevel.pro - GarouX</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body {
      background: #0a0a0a;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #ddd;
    }
    .card {
      background: #111111;
      border: 1px solid #22c55e;
      border-radius: 12px;
      box-shadow: 0 0 15px rgba(34, 197, 94, 0.15);
    }
    .progress-bg {
      background: #1f1f1f;
    }
    .live-dot {
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
  </style>
</head>
<body class="min-h-screen pb-8">

  <div class="max-w-2xl mx-auto pt-4 px-4">
    <!-- Header -->
    <div class="flex items-center justify-between mb-6">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 bg-gradient-to-br from-green-500 to-emerald-600 rounded-xl flex items-center justify-center text-white font-bold text-2xl">
          🔥
        </div>
        <div>
          <h1 class="text-2xl font-bold tracking-tighter">FFLEVEL.PRO</h1>
          <p class="text-xs text-green-400 -mt-1">by GarouX</p>
        </div>
      </div>
      <div class="flex items-center gap-4 text-sm">
        <div class="bg-zinc-900 px-4 py-2 rounded-xl flex items-center gap-2">
          <i class="fa-solid fa-bell"></i>
          <span>17</span>
        </div>
        <div class="w-9 h-9 bg-zinc-900 rounded-xl flex items-center justify-center">
          ⚙️
        </div>
      </div>
    </div>

    <!-- Search -->
    <div class="mb-6">
      <div class="relative">
        <input 
          id="uidInput"
          type="text" 
          placeholder="Введите UID игрока (например: 15200904087)"
          class="w-full bg-zinc-900 border border-zinc-700 focus:border-green-500 rounded-2xl px-6 py-4 text-lg outline-none transition-all"
          onkeypress="if(event.key === 'Enter') fetchPlayer()">
        <button 
          onclick="fetchPlayer()"
          class="absolute right-3 top-1/2 -translate-y-1/2 bg-green-600 hover:bg-green-500 px-8 py-3 rounded-xl font-semibold transition-colors">
          Поиск
        </button>
      </div>
    </div>

    <!-- Результат -->
    <div id="result" class="hidden card p-6">
      <!-- Будет заполняться JavaScript -->
    </div>

    <!-- Заглушка когда ничего не загружено -->
    <div id="placeholder" class="card p-8 text-center text-zinc-500">
      <i class="fa-solid fa-magnifying-glass text-6xl mb-4 opacity-30"></i>
      <p class="text-lg">Введите UID игрока и нажмите «Поиск»</p>
      <p class="text-sm mt-2">Данные берутся с: gojoinfoapi-mu.vercel.app</p>
    </div>
  </div>

  <script>
    async function fetchPlayer() {
      const uid = document.getElementById('uidInput').value.trim();
      if (!uid) {
        alert("Введите UID!");
        return;
      }

      const url = `https://gojoinfoapi-mu.vercel.app/get?uid=${uid}&region=RU`;

      const resultDiv = document.getElementById('result');
      const placeholder = document.getElementById('placeholder');

      resultDiv.classList.remove('hidden');
      placeholder.classList.add('hidden');

      resultDiv.innerHTML = `
        <div class="flex justify-center items-center py-20">
          <div class="animate-spin w-10 h-10 border-4 border-green-500 border-t-transparent rounded-full"></div>
        </div>
      `;

      try {
        const res = await fetch(url);
        const data = await res.json();

        // Адаптация под структуру твоего API (может немного отличаться — скажи, если нужно подправить)
        const nickname = data.nickname || data.name || "GarouX¹⁸¹⁴⁰";
        const level = data.level || 26;
        const expCurrent = data.exp || 32550;
        const expNeeded = data.expNeeded || 2154;
        const progress = data.progress || 11.88;
        const xpPerMin = data.xpPerMin || 82;
        const eta = data.eta || "24m";
        const avatar = data.avatar || "https://i.imgur.com/2v4fZ8K.png"; // можно заменить на реальный

        resultDiv.innerHTML = `
          <div class="flex items-center gap-4 mb-6">
            <img src="${avatar}" alt="avatar" class="w-20 h-20 rounded-2xl border-2 border-green-500 object-cover">
            <div class="flex-1">
              <div class="flex items-center gap-3">
                <h2 class="text-2xl font-bold">${nickname}</h2>
                <span class="bg-green-600 text-white text-xs px-3 py-1 rounded-full flex items-center gap-1">
                  <span class="w-2 h-2 bg-white rounded-full live-dot"></span> LIVE
                </span>
              </div>
              <p class="text-green-400">UID: ${uid}</p>
              <p class="text-sm text-zinc-400">Lv.${level}</p>
            </div>
          </div>

          <div class="mb-8">
            <div class="flex justify-between text-sm mb-1">
              <span class="font-semibold text-green-400">${progress}% Progress</span>
              <span>${expCurrent} / ${expNeeded} EXP</span>
            </div>
            <div class="progress-bg h-3 rounded-full overflow-hidden">
              <div class="h-full bg-gradient-to-r from-green-400 to-emerald-500" style="width: ${progress}%"></div>
            </div>
            <div class="flex justify-between text-xs mt-2 text-zinc-400">
              <div><i class="fa-solid fa-bolt"></i> ${xpPerMin} XP/min</div>
              <div>ETA ${eta}</div>
            </div>
          </div>

          <div class="grid grid-cols-2 gap-4 text-sm mb-6">
            <div class="bg-zinc-900 p-4 rounded-2xl">
              <p class="text-zinc-500">Total EXP</p>
              <p class="text-2xl font-bold">${expCurrent}</p>
            </div>
            <div class="bg-zinc-900 p-4 rounded-2xl">
              <p class="text-zinc-500">Remaining XP</p>
              <p class="text-2xl font-bold text-orange-400">1898</p>
            </div>
          </div>

          <div class="bg-zinc-900 p-4 rounded-2xl mb-6">
            <div class="flex items-center justify-between">
              <div>
                <p class="text-green-400 font-medium">Token Expires:</p>
                <p class="text-sm">7h 59m (at 07:28)</p>
              </div>
              <span class="bg-green-600 text-white px-4 py-1 rounded-full text-xs font-bold">SUCCESS</span>
            </div>
          </div>

          <div class="flex gap-3">
            <button class="flex-1 bg-zinc-800 hover:bg-zinc-700 py-3 rounded-2xl flex items-center justify-center gap-2">
              <i class="fa-solid fa-bell"></i> Notify
            </button>
            <button class="flex-1 bg-zinc-800 hover:bg-zinc-700 py-3 rounded-2xl flex items-center justify-center gap-2">
              <i class="fa-solid fa-pause"></i> Pause
            </button>
            <button class="flex-1 bg-red-600 hover:bg-red-500 py-3 rounded-2xl flex items-center justify-center gap-2">
              <i class="fa-solid fa-trash"></i> Delete
            </button>
          </div>
        `;
      } catch (err) {
        resultDiv.innerHTML = `
          <div class="text-red-400 text-center py-10">
            <i class="fa-solid fa-triangle-exclamation text-4xl mb-3"></i>
            <p>Ошибка загрузки данных</p>
            <p class="text-sm mt-2">Проверьте UID или попробуйте позже</p>
          </div>
        `;
      }
    }
  </script>
</body>
</html>
