<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>FFGarouX</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:radial-gradient(circle at top,#0f1230,#05050d);
  color:#fff;
}
.center{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
}
.card{
  width:320px;
  background:rgba(20,25,60,.75);
  backdrop-filter:blur(12px);
  border-radius:22px;
  padding:25px;
  box-shadow:0 20px 50px rgba(0,0,0,.6);
}
.logo{
  text-align:center;
  margin-bottom:20px;
}
.logo img{
  width:72px;
  height:72px;
  border-radius:50%;
}
input{
  width:100%;
  padding:14px;
  margin:10px 0;
  border:none;
  border-radius:14px;
  outline:none;
  background:#0b0f2a;
  color:#fff;
}
button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:18px;
  font-size:16px;
  font-weight:bold;
  cursor:pointer;
  margin-top:10px;
}
.btn-login{
  background:linear-gradient(90deg,#ff3b6a,#28e0ff);
  color:#fff;
}
.btn-reg{
  background:#1a1f4d;
  color:#ccc;
}
#app{
  display:none;
  padding:20px;
  max-width:500px;
  margin:auto;
}
.review{
  background:#0e1235;
  padding:12px;
  border-radius:14px;
  margin-bottom:10px;
}
.review b{color:#4fdcff}
</style>
</head>

<body>

<!-- AUTH -->
<div class="center" id="auth">
  <div class="card">
    <div class="logo">
      <img src="bg.jpg">
      <h3>FFGarouX</h3>
    </div>
    <input id="nick" placeholder="Никнейм">
    <input id="pass" type="password" placeholder="Пароль">
    <button class="btn-login" id="loginBtn">Войти</button>
    <button class="btn-reg" id="regBtn">Регистрация</button>
  </div>
</div>

<!-- APP -->
<div id="app">
  <h2>Отзывы</h2>
  <div id="reviews"></div>
  <input id="reviewText" placeholder="Написать отзыв">
  <button class="btn-login" id="sendReview">Отправить</button>
  <br><br>
  <button class="btn-reg" id="logout">Выйти</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, addDoc, getDocs, serverTimestamp, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

/* 🔥 ТВОЙ FIREBASE CONFIG — УЖЕ ВСТАВЛЕН 🔥 */
const firebaseConfig = {
  apiKey: "AIzaSyCBZQzVUcx7-A5y7hgCvGjwhu4mfAWVEIE",
  authDomain: "ffgaroux-a58e7.firebaseapp.com",
  projectId: "ffgaroux-a58e7",
  storageBucket: "ffgaroux-a58e7.firebasestorage.app",
  messagingSenderId: "967486028392",
  appId: "1:967486028392:web:3de0f014b77d0ac27659dd"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const authBox = document.getElementById("auth");
const appBox = document.getElementById("app");

function nickToEmail(nick){
  return nick.toLowerCase().replace(/\s+/g,'') + "@ffgaroux.app";
}

loginBtn.onclick = () => {
  if(!nick.value || !pass.value) return alert("Заполни все поля");
  signInWithEmailAndPassword(auth, nickToEmail(nick.value), pass.value)
    .catch(()=>alert("Неверный ник или пароль"));
};

regBtn.onclick = () => {
  if(nick.value.length < 3) return alert("Ник минимум 3 символа");
  if(pass.value.length < 6) return alert("Пароль минимум 6 символов");
  createUserWithEmailAndPassword(auth, nickToEmail(nick.value), pass.value)
    .catch(()=>alert("Ник уже занят или ошибка"));
};

logout.onclick = () => signOut(auth);

sendReview.onclick = async () => {
  if(!reviewText.value) return;
  await addDoc(collection(db,"reviews"),{
    nick:nick.value,
    text:reviewText.value,
    time:serverTimestamp()
  });
  reviewText.value="";
  loadReviews();
};

async function loadReviews(){
  reviews.innerHTML="";
  const q = query(collection(db,"reviews"), orderBy("time","desc"));
  const snap = await getDocs(q);
  snap.forEach(d=>{
    const r=d.data();
    reviews.innerHTML += `<div class="review"><b>${r.nick}</b><br>${r.text}</div>`;
  });
}

onAuthStateChanged(auth,user=>{
  if(user){
    authBox.style.display="none";
    appBox.style.display="block";
    loadReviews();
  }else{
    authBox.style.display="flex";
    appBox.style.display="none";
  }
});
</script>

</body>
</html>
